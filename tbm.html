<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">

<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans KR','Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#f5f5f4;color:#1c1917;min-height:100vh;font-size:13px;}

.page-header{color:#fff;padding:20px 18px 18px;box-shadow:0 1px 0 #1c1917;position:relative;background:#292524;border-bottom:3px solid #1c1917;}
@media(min-width:600px){.page-header{padding:24px 28px 20px;}}
.page-header .doc-no{display:inline-block;font-size:10px;font-weight:700;letter-spacing:0.18em;padding:2px 10px;border:1px solid rgba(255,255,255,0.3);border-radius:2px;margin-bottom:10px;color:rgba(255,255,255,0.85);}
.page-header h1{font-size:20px;font-weight:900;letter-spacing:-0.02em;}
.page-header .sub{font-size:12px;opacity:0.7;margin-top:4px;}
.page-header .conn{position:absolute;top:16px;right:20px;font-size:11px;background:rgba(255,255,255,0.1);padding:4px 10px;border-radius:4px;display:flex;align-items:center;gap:6px;}
.conn-dot{width:7px;height:7px;border-radius:50%;background:#78716c;}
.conn-dot.connected{background:#d6d3d1;animation:pulse 2s infinite;}
.conn-dot.error{background:#ef4444;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}

.container{max-width:720px;margin:0 auto;padding:16px 14px 60px;}

.card{background:#fff;border:1px solid #d6d3d1;border-radius:4px;padding:22px 18px;margin-bottom:14px;box-shadow:none;}
@media(min-width:600px){.card{padding:32px 34px;}}
.card-title{font-size:22px;font-weight:900;color:#1c1917;margin-bottom:24px;padding:2px 0 14px 16px;border-left:5px solid #1c1917;border-bottom:2px solid #1c1917;display:flex;justify-content:space-between;align-items:center;letter-spacing:-0.025em;line-height:1.25;}

.section-title{font-size:13px;font-weight:800;letter-spacing:0.22em;color:#44403c;padding-bottom:10px;margin:34px 0 20px;border-bottom:1px solid #57534e;text-transform:uppercase;display:flex;align-items:baseline;gap:12px;}
.section-title:first-of-type{margin-top:4px;}
.section-title .roman{display:inline-block;font-size:17px;font-weight:900;color:#1c1917;letter-spacing:0.06em;}

.btn{display:inline-block;padding:8px 16px;background:#292524;color:#fff;border:none;border-radius:3px;font-size:12px;font-weight:700;cursor:pointer;text-decoration:none;transition:background 0.15s;letter-spacing:0.02em;}
.btn:hover{background:#1c1917;}
.btn-outline{background:#fff;color:#44403c;border:1px solid #a8a29e;}
.btn-outline:hover{background:#f5f5f4;border-color:#78716c;}
.btn-sm{padding:5px 10px;font-size:11px;}
.btn-lg{padding:12px 24px;font-size:14px;}
.btn-primary-big{padding:16px 32px;font-size:13px;width:100%;font-weight:800;letter-spacing:0.25em;text-transform:uppercase;border-radius:3px;margin-top:8px;}

label.field{display:block;margin-bottom:16px;}
label.field > .lb{display:flex;align-items:center;gap:10px;font-size:15px;font-weight:700;color:#a8a29e;margin-bottom:10px;letter-spacing:-0.015em;transition:color 0.2s;}
label.field > .lb .no{display:inline-flex;align-items:center;justify-content:center;min-width:34px;height:24px;padding:0 8px;background:#fafaf9;border:1px solid #d6d3d1;color:#a8a29e;font-size:11px;font-weight:800;letter-spacing:0.08em;border-radius:3px;transition:all 0.2s;font-feature-settings:"tnum";}
label.field > .lb .lb-hint{margin-left:6px;font-size:12px;font-weight:500;color:#a8a29e;letter-spacing:normal;}
label.field.filled > .lb .lb-hint{color:#a8a29e;}
label.field > .hint{display:block;font-size:12px;color:#a8a29e;margin-top:6px;transition:color 0.2s;}
label.field.filled > .lb{color:#1c1917;}
label.field.filled > .lb .no{background:#1c1917;color:#fff;border-color:#1c1917;}
label.field.filled > .hint{color:#78716c;}
input[type="text"], input[type="date"], input[type="time"], input[type="number"], select, textarea{
  width:100%;border:1px solid #d6d3d1;border-radius:4px;padding:12px 14px;font-size:16px;font-family:inherit;
  background:#fff;color:#a8a29e;transition:color 0.2s, border-color 0.15s;
  -webkit-appearance:none;
}
input[type="date"], input[type="time"]{-webkit-appearance:listbox;}
label.field.filled input, label.field.filled select, label.field.filled textarea{color:#1c1917;border-color:#a8a29e;}
input:focus, select:focus, textarea:focus{outline:none;border-color:#44403c;color:#1c1917;}
textarea{resize:vertical;min-height:100px;}
/* 4가지 필드 세로 분리 배치 — 모바일 우선 */
label.field{display:block;margin-bottom:20px;padding-bottom:16px;border-bottom:1px dashed #e7e5e4;}
label.field:last-of-type{border-bottom:none;}
/* 숫자 참석/총원 2개 나란히 */
.inline-2{display:flex;align-items:center;gap:8px;}
.inline-2 input{flex:0 0 100px;}
.inline-2 .sep{color:#a8a29e;font-weight:700;}
.inline-2 .unit{color:#78716c;font-size:13px;}

.readonly-box{background:#fafaf9;border:1px dashed #d6d3d1;border-radius:4px;padding:12px 14px;font-size:16px;color:#a8a29e;min-height:46px;line-height:1.55;white-space:pre-wrap;transition:color 0.2s, border-color 0.2s, background 0.2s;font-family:inherit;}
label.field.filled .readonly-box{color:#1c1917;border-color:#a8a29e;border-style:solid;background:#fff;}

.warn-banner{background:#fefce8;border:1px solid #e4dcc5;border-left:3px solid #a16207;border-radius:4px;padding:10px 14px;font-size:12px;color:#713f12;margin-bottom:14px;line-height:1.6;}

.warn-banner.sup.show{display:block;}

.hint-warn{display:none;margin-top:8px;padding:8px 12px;font-size:11px;color:#713f12;background:#fefce8;border:1px solid #e4dcc5;border-left:3px solid #a16207;border-radius:3px;line-height:1.55;font-weight:500;}
.hint-warn.show{display:block;}

/* 플레이스홀더 통일 — 빈 필드는 옅은 회색, 채움 필드는 진한색 (.filled) */
input::placeholder, textarea::placeholder{color:#a8a29e;opacity:1;}
label.field.filled input::placeholder, label.field.filled textarea::placeholder{color:#a8a29e;}

.team-select-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px;}
@media(max-width:600px){.team-select-grid{grid-template-columns:1fr;}}
.team-card{border-radius:6px;padding:28px 24px;color:#fff;cursor:pointer;transition:background 0.15s;text-decoration:none;display:block;background:#292524;border:1px solid #1c1917;position:relative;}

.team-card .nm{font-size:26px;font-weight:900;margin-top:10px;letter-spacing:-0.025em;line-height:1.2;}
.team-card .dsc{font-size:14px;opacity:0.75;margin-top:8px;font-weight:500;}
.team-card .arrow{position:absolute;top:24px;right:22px;font-size:22px;opacity:0.5;font-weight:300;}

.recent-row{display:flex;gap:10px;align-items:flex-start;padding:10px;border-bottom:1px solid #e7e5e4;font-size:12px;}
.recent-row:last-child{border-bottom:none;}
.recent-row .d{font-weight:700;color:#1c1917;min-width:90px;}
.recent-row .t{flex:1;color:#44403c;}
.recent-row .t .tt{font-weight:700;color:#1c1917;}
.recent-row .t .msg{color:#78716c;margin-top:2px;}
.recent-row .t .note{margin-top:4px;padding:6px 10px;background:#fafaf9;border:1px solid #e7e5e4;border-radius:3px;color:#44403c;font-size:11px;}
.recent-row .t .note .note-label{display:inline-block;font-size:9px;font-weight:800;letter-spacing:0.12em;color:#78716c;padding:1px 6px;border:1px solid #d6d3d1;background:#fff;border-radius:2px;margin-right:4px;}
.recent-row .act{display:flex;flex-direction:column;gap:4px;}

.photo-status{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:4px;font-size:12px;margin-bottom:10px;border:1px solid transparent;}
.photo-status.done{background:#fafaf9;color:#44403c;border-color:#d6d3d1;}
.photo-status.pending{background:#fefce8;color:#713f12;border-color:#e4dcc5;}

.photo-lightbox{position:fixed;inset:0;background:rgba(28,25,23,0.9);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px;cursor:zoom-out;}
.photo-lightbox.show{display:flex;}
.photo-lightbox img{max-width:95%;max-height:92vh;object-fit:contain;border-radius:4px;box-shadow:0 4px 24px rgba(0,0,0,0.5);}
.photo-lightbox .close-btn{position:absolute;top:16px;right:20px;background:rgba(255,255,255,0.15);color:#fff;border:none;width:40px;height:40px;border-radius:50%;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;}

.thumb{width:54px;height:54px;object-fit:cover;border-radius:4px;border:1px solid #d6d3d1;cursor:pointer;flex-shrink:0;}

@media print{
  .no-print{display:none!important;}
  body{background:#fff;}
  .page-header{background:#292524!important;-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}
  .card{box-shadow:none!important;border:1px solid #000!important;break-inside:avoid;}
  @page{size:A4 portrait;margin:10mm;}
}
</style>

<body>

<div class="page-header" id="page-header">
  <div class="conn no-print"><span id="conn-dot" class="conn-dot"></span><span id="conn-text">연결 확인 중...</span></div>

        <span class="lb"><span class="no">04</span> 참석 / 총원 <span class="lb-hint">휴가자 제외 인원 기재</span></span>
        <div class="inline-2">

<script>
// ============================================================
// TEAM META
// ============================================================
const TEAM_META = {
  injection_day:   {label:'사출팀 (주간)', process:'injection', defaultTime:'08:40~08:50(10분)', code:'TBM-A1', num:'01'},
  injection_night: {label:'사출팀 (야간)', process:'injection', defaultTime:'20:20~20:30(10분)', code:'TBM-A2', num:'02'},
  paint:           {label:'도장팀',        process:'paint',     defaultTime:'08:40~08:50(10분)', code:'TBM-B',  num:'03'},
  assembly:        {label:'조립팀',        process:'assembly',  defaultTime:'08:40~08:50(10분)', code:'TBM-C',  num:'04'}
};

// ============================================================
// URL PARSE
// ============================================================
const urlParams = new URLSearchParams(location.search);
const teamCode = urlParams.get('team');

// ============================================================
// SUPABASE LAYER
// ============================================================
const DEFAULT_SUPABASE_URL = 'https://onohwrswzaiwbabiusrj.supabase.co';
const DEFAULT_SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9ub2h3cnN3emFpd2JhYml1c3JqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMjQ5MTgsImV4cCI6MjA4OTgwMDkxOH0.vK_l0iWBJyZmLwzNfQHob2ejEZGfg8mQ8mV-6-lXaN0';
let supaClient = null;

const DB = {
  get(key){ try{return JSON.parse(localStorage.getItem('safety_'+key))||[];}catch{return [];} },
  getObj(key){ try{return JSON.parse(localStorage.getItem('safety_'+key))||{};}catch{return {};} },
  async set(key, val){
    localStorage.setItem('safety_'+key, JSON.stringify(val));
    if(!supaClient) return;
    try{
      await supaClient.from('safety_store').upsert({key, value:val}, {onConflict:'key'});
    }catch(e){ console.error('Supabase upsert 실패:', key, e); }
  }
};

function _isEmptySafetyValue(v){
  if(v === null || v === undefined) return true;
  if(Array.isArray(v)) return v.length === 0;
  if(typeof v === 'object') return Object.keys(v).length === 0;
  return false;
}

async function loadFromSupabase(){
  if(!supaClient) return;
  try{
    const {data, error} = await supaClient.from('safety_store').select('*');
    if(error) throw error;
    if(data) data.forEach(row => {
      const localRaw = localStorage.getItem('safety_'+row.key);
      if(_isEmptySafetyValue(row.value) && localRaw){
        try{
          const localVal = JSON.parse(localRaw);
          if(!_isEmptySafetyValue(localVal)){
            console.warn('[supaLoad 가드]', row.key, '원격 빈 값 감지 → 로컬 보존');
            return;
          }
        }catch(e){}
      }
      localStorage.setItem('safety_'+row.key, JSON.stringify(row.value));
    });
  }catch(e){ console.error('supaLoad:', e); }
}

function initSupabase(url, key){
  try{
    supaClient = supabase.createClient(url, key);
    const dot = document.getElementById('conn-dot');
    const txt = document.getElementById('conn-text');
    if(dot) dot.className = 'conn-dot connected';
    if(txt) txt.textContent = '실시간 공유 연결됨';
    const warn = document.getElementById('warn-no-supa');
    if(warn) warn.classList.remove('show');
    supaClient.channel('tbm_daily_sync')
      .on('postgres_changes', {event:'*', schema:'public', table:'safety_store'}, async () => {
        await loadFromSupabase();
        if(teamCode && TEAM_META[teamCode]){
          renderRecentRecords();
          checkFreeNoteBanner();
          checkMonthPhotoStatus();
        }
      })
      .subscribe();
    return true;
  }catch(e){
    console.error('Supabase 연결 실패:', e);
    const dot = document.getElementById('conn-dot');
    const txt = document.getElementById('conn-text');
    if(dot) dot.className = 'conn-dot error';
    if(txt) txt.textContent = '연결 실패';
    return false;
  }
}

async function uploadToStorage(file, subfolder){
  if(!supaClient) throw new Error('Supabase 미연결');
  const ts = Date.now();
  const safeName = file.name.replace(/[^a-zA-Z0-9가-힣._-]/g, '_');
  const path = `${subfolder}/${ts}_${safeName}`;
  const {error} = await supaClient.storage.from('safety-files').upload(path, file, {
    contentType: file.type || 'application/octet-stream', upsert: false
  });
  if(error) throw error;
  const {data:urlData} = supaClient.storage.from('safety-files').getPublicUrl(path);
  return {url:urlData.publicUrl, path};
}

// ============================================================
// TBM DAILY CRUD
// ============================================================
function getTbmRecords(){ return DB.get('tbm_daily'); }
async function saveTbmRecordsAll(list){ await DB.set('tbm_daily', list); }

async function saveTbmRecord(){
  if(!teamCode || !TEAM_META[teamCode]){ alert('팀이 지정되지 않았습니다.'); return; }
  const tbmSel = document.getElementById('f-tbm-no').value;
  const riskSel = document.getElementById('f-risk-idx').value;
  if(!tbmSel){ alert('TBM 명을 선택해주세요.'); return; }
  if(!riskSel){ alert('유해위험요인을 선택해주세요.'); return; }

  const meta = TEAM_META[teamCode];
  const tbmOpt = TBM_OPTIONS[meta.process].find(o => String(o.no) === tbmSel);
  const riskOpt = RISK_OPTIONS[meta.process][parseInt(riskSel)];

  const record = {
    id: Date.now(),
    team: teamCode,
    teamLabel: meta.label,
    process: meta.process,
    date: document.getElementById('f-date').value || new Date().toISOString().split('T')[0],
    time: document.getElementById('f-time').value || meta.defaultTime,
    lecturer: document.getElementById('f-lecturer').value.trim(),
    attended: parseInt(document.getElementById('f-attended').value) || 0,
    total: parseInt(document.getElementById('f-total').value) || 0,
    tbmNo: tbmOpt.no,
    tbmTitle: tbmOpt.title,
    tbmMessage: tbmOpt.message,
    riskIdx: parseInt(riskSel),
    riskCategory: riskOpt.category,
    riskText: riskOpt.risk,
    measureText: riskOpt.measure,
    freeNote: document.getElementById('f-free-note').value.trim(),
    photoUrl: '',
    photoPath: '',
    createdAt: new Date().toISOString()
  };

  // 사진 업로드 (있을 때만)
  const photoInput = document.getElementById('f-photo');
  if(photoInput.files && photoInput.files[0]){
    if(!supaClient){ alert('Supabase 미연결 상태라 사진 업로드가 불가합니다.'); return; }
    try{
      const meta2 = await uploadToStorage(photoInput.files[0], `tbm_daily/${teamCode}/${record.date}`);
      record.photoUrl = meta2.url;
      record.photoPath = meta2.path;
    }catch(e){
      alert('사진 업로드 실패: ' + (e.message||e));
      return;
    }
  }

  const records = getTbmRecords();
  records.push(record);
  await saveTbmRecordsAll(records);

  // 폼 리셋 (팀/시간 등은 유지, 입력값만 비움)
  document.getElementById('f-lecturer').value = '';
  document.getElementById('f-attended').value = '';
  document.getElementById('f-total').value = '';
  document.getElementById('f-tbm-no').value = '';
  document.getElementById('f-risk-idx').value = '';
  document.getElementById('f-tbm-message').textContent = 'TBM 명을 선택하면 자동으로 표시됩니다.';
  document.getElementById('f-risk-measure').textContent = '유해위험요인을 선택하면 자동으로 표시됩니다.';
  document.getElementById('f-risk-category-chip').innerHTML = '';
  document.getElementById('f-free-note').value = '';
  document.getElementById('f-photo').value = '';

  alert('✅ TBM 기록이 저장되었어요!');
  renderRecentRecords();
  checkFreeNoteBanner();
  checkMonthPhotoStatus();
}

async function deleteTbmRecord(id){
  if(!confirm('이 기록을 삭제할까요?')) return;
  const records = getTbmRecords();
  const rec = records.find(r => r.id === id);
  if(rec && rec.photoPath && supaClient){
    try{ await supaClient.storage.from('safety-files').remove([rec.photoPath]); }catch(e){ console.warn(e); }
  }
  await saveTbmRecordsAll(records.filter(r => r.id !== id));
  renderRecentRecords();
  checkFreeNoteBanner();
  checkMonthPhotoStatus();
}

// ============================================================
// DROPDOWN HANDLERS
// ============================================================
function onTbmSelectChange(){
  const meta = TEAM_META[teamCode];
  if(!meta) return;
  const val = document.getElementById('f-tbm-no').value;
  const opt = (TBM_OPTIONS[meta.process]||[]).find(o => String(o.no) === val);
  const box = document.getElementById('f-tbm-message');
  const lblMsg = document.getElementById('lbl-tbm-msg');
  const lblTbm = document.getElementById('lbl-tbm');
  if(opt){
    box.textContent = opt.message;
    lblMsg.classList.add('filled');
    lblTbm.classList.add('filled');
  } else {
    box.textContent = '';
    lblMsg.classList.remove('filled');
    lblTbm.classList.remove('filled');
  }
}

function onRiskSelectChange(){
  const meta = TEAM_META[teamCode];
  if(!meta) return;
  const val = document.getElementById('f-risk-idx').value;
  const chip = document.getElementById('f-risk-category-chip');
  const box = document.getElementById('f-risk-measure');
  const lblMeasure = document.getElementById('lbl-risk-measure');
  const lblRisk = document.getElementById('lbl-risk');
  if(val === ''){
    chip.innerHTML = '';
    box.textContent = '';
    lblMeasure.classList.remove('filled');
    lblRisk.classList.remove('filled');
    return;
  }
  const opt = RISK_OPTIONS[meta.process][parseInt(val)];
  if(opt){
    chip.innerHTML = `<span class="cat-chip">${opt.category}</span>`;
    box.textContent = opt.measure;
    lblMeasure.classList.add('filled');
    lblRisk.classList.add('filled');
  }
}

// 입력 필드에 값이 있으면 label.field에 .filled 클래스 부여 (옅은 회색 → 진한 색)
function setupFieldFilled(){
  document.querySelectorAll('label.field').forEach(label => {
    const ctrl = label.querySelector('input, select, textarea');
    if(!ctrl) return; // readonly-box만 있는 라벨은 onTbm/onRisk Change에서 따로 처리
    const update = () => {
      let filled = false;
      if(ctrl.tagName === 'INPUT' && ctrl.type === 'file'){
        filled = ctrl.files && ctrl.files.length > 0;
      } else {
        filled = (ctrl.value || '').trim() !== '';
      }
      label.classList.toggle('filled', filled);
    };
    ctrl.addEventListener('input', update);
    ctrl.addEventListener('change', update);
    update();
  });
}

// ============================================================
// BANNERS
// ============================================================
function checkFreeNoteBanner(){
  // 14일 무기재 시 textarea placeholder 강조 (옅은 주황 테두리)
  const ta = document.getElementById('f-free-note');
  if(!ta) return;
  const records = getTbmRecords().filter(r => r.team === teamCode);
  const cutoff = new Date(Date.now() - 14*24*60*60*1000);
  const hasRecentNote = records.some(r => (r.freeNote||'').trim() && new Date(r.date) >= cutoff);
  ta.classList.toggle('need-input', !hasRecentNote);
}

function checkMonthPhotoStatus(){
  const hint = document.getElementById('photo-hint');
  if(!hint) return;
  const now = new Date();
  const ym = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const records = getTbmRecords().filter(r => r.team === teamCode && r.photoUrl);
  const hasThisMonth = records.some(r => (r.date||'').startsWith(ym));
  if(hasThisMonth){
    hint.classList.remove('show');
    hint.innerHTML = '';
  } else {
    hint.innerHTML = `※ 이번 달(${ym}) TBM 실시 사진이 아직 없습니다. 분기 1회 이상 현장 사진 첨부를 권장합니다.`;
    hint.classList.add('show');
  }
}

// ============================================================
// RENDER
// ============================================================
function renderTeamSelectView(){
  const grid = document.getElementById('team-select-grid');
  grid.innerHTML = Object.keys(TEAM_META).map(code => {
    const m = TEAM_META[code];
    return `<a class="team-card" href="?team=${code}">
      <div class="num">${m.num} · ${m.code}</div>
      <div class="nm">${m.label}</div>
      <div class="dsc">${m.defaultTime}</div>
      <div class="arrow">→</div>
    </a>`;
  }).join('');
}

function populateDropdowns(){
  const meta = TEAM_META[teamCode];
  const tbmSel = document.getElementById('f-tbm-no');
  tbmSel.innerHTML = '<option value="">— TBM 주제를 선택하세요 —</option>' +
    (TBM_OPTIONS[meta.process]||[]).map(o => `<option value="${o.no}">${o.no}. ${o.title}</option>`).join('');

  // 유해위험요인: 카테고리별 optgroup
  const riskSel = document.getElementById('f-risk-idx');
  const list = RISK_OPTIONS[meta.process]||[];
  const byCat = {};
  list.forEach((o,i) => {
    if(!byCat[o.category]) byCat[o.category] = [];
    byCat[o.category].push({...o, idx:i});
  });
  let html = '<option value="">— 유해위험요인을 선택하세요 —</option>';
  Object.keys(byCat).forEach(cat => {
    html += `<optgroup label="${cat}">`;
    byCat[cat].forEach(o => { html += `<option value="${o.idx}">${o.risk.trim()}</option>`; });
    html += '</optgroup>';
  });
  riskSel.innerHTML = html;
}

function renderRecentRecords(){
  const box = document.getElementById('recent-records');
  const cnt = document.getElementById('recent-count');
  if(!box) return;
  const all = getTbmRecords().filter(r => r.team === teamCode)
    .sort((a,b) => new Date(b.date) - new Date(a.date) || b.id - a.id);
  if(cnt) cnt.textContent = `(총 ${all.length}건, 최신 10개 표시)`;
  const recent = all.slice(0, 10);
  if(recent.length === 0){
    box.innerHTML = '<div style="text-align:center;color:#9ca3af;padding:20px;font-size:12px;">아직 저장된 기록이 없어요.</div>';
    return;
  }
  box.innerHTML = recent.map(r => {
    const photoEl = r.photoUrl ? `<img class="thumb" src="${r.photoUrl}" onclick="openPhotoLightbox('${r.photoUrl}')">` : '';
    const note = (r.freeNote||'').trim() ? `<div class="note"><span class="note-label">비고</span> ${escapeHtml(r.freeNote)}</div>` : '';
    let createdStr = '';
    if(r.createdAt){
      const c = new Date(r.createdAt);
      createdStr = `${c.getFullYear()}-${String(c.getMonth()+1).padStart(2,'0')}-${String(c.getDate()).padStart(2,'0')} ${String(c.getHours()).padStart(2,'0')}:${String(c.getMinutes()).padStart(2,'0')}`;
    }
    return `<div class="recent-row">
      <div class="d">${r.date}<div style="font-weight:400;font-size:10px;color:#a8a29e;margin-top:2px;">${r.time||''}</div>${createdStr?`<div class="rec-created" title="실제 기록 시각">rec. ${createdStr}</div>`:''}</div>
      <div class="t">
        <div class="tt">${escapeHtml(r.tbmTitle||'')} · 강사 ${escapeHtml(r.lecturer||'-')} · ${r.attended||0}/${r.total||0}명</div>
        <div class="msg"><span class="cat-chip" style="margin-left:0;">${escapeHtml(r.riskCategory||'')}</span> ${escapeHtml(r.riskText||'')}</div>
        ${note}
      </div>
      ${photoEl}
      <div class="act no-print">
        <button class="btn btn-outline btn-sm" onclick="deleteTbmRecord(${r.id})" style="font-size:10px;">삭제</button>
      </div>
    </div>`;
  }).join('');
}

function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function applyTeamHeader(){
  const meta = TEAM_META[teamCode];
  document.getElementById('h-code').textContent = meta.code;
  document.getElementById('h-title').textContent = `${meta.label} · TBM 일지`;
  document.getElementById('h-sub').textContent = `${meta.defaultTime} · 매일 작업 전 실시 · 전원 참석`;
  document.title = `${meta.label} TBM | 산업안전보건`;
}

function openPhotoLightbox(src){
  document.getElementById('lightbox-img').src = src;
  document.getElementById('photo-lightbox').classList.add('show');
  document.body.style.overflow = 'hidden';
}
function closePhotoLightbox(){
  document.getElementById('photo-lightbox').classList.remove('show');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if(e.key === 'Escape') closePhotoLightbox(); });

// ============================================================
// INIT
// ============================================================
window.addEventListener('DOMContentLoaded', async () => {
  initSupabase(DEFAULT_SUPABASE_URL, DEFAULT_SUPABASE_KEY);
  await loadFromSupabase();

  if(!teamCode || !TEAM_META[teamCode]){
    document.getElementById('view-select').style.display = 'block';
    renderTeamSelectView();
    return;
  }

  // 팀별 입력 화면
  applyTeamHeader();
  document.getElementById('view-input').style.display = 'block';

  // 기본값 세팅 — 현재 날짜·시각 (사용자가 수동으로 다른 날짜/시각으로 수정 가능)
  const meta = TEAM_META[teamCode];
  const now = new Date();
  document.getElementById('f-date').value = now.toISOString().split('T')[0];
  document.getElementById('f-time').value = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

  populateDropdowns();
  setupFieldFilled();
  renderRecentRecords();
  checkFreeNoteBanner();
  checkMonthPhotoStatus();

  // 저장소 실시간 이벤트
  window.addEventListener('storage', e => {
    if(e.key === 'safety_tbm_daily'){
      renderRecentRecords();
      checkFreeNoteBanner();
      checkMonthPhotoStatus();
    }
  });
});
</script>
