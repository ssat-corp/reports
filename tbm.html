  @page{size:A4 portrait;margin:10mm;}

<script>
// ============================================================
// SHARED INFRASTRUCTURE
// ============================================================
const DRIVE_UPLOAD_URL = 'https://script.google.com/macros/s/AKfycbyiZ5j5XH7G3gOMXzlSxbX9hJ5WxCf2J3PMUGGZfaQI3jQC7s0NOn-T8grEmi7LRpIZuA/exec';

let supaClient = null;
function initSupabase(url, key){
  if(!url || !key) return;
  try{
    supaClient = supabase.createClient(url, key);
    document.getElementById('conn-dot').className = 'conn-dot connected';
    document.getElementById('conn-text').textContent = '실시간 공유 연결됨';
    supaClient.channel('tbm_sync')
      .on('postgres_changes', {event:'*', schema:'public', table:'safety_store'}, () => {
        supaLoadAll().then(() => { renderTbmCalendar(); renderHistories(); });
      })
      .subscribe();
    supaLoadAll();
  }catch(e){ console.error('Supabase 연결 실패:', e); }
}
async function supaLoadAll(){
  if(!supaClient) return;
  try{
    const {data} = await supaClient.from('safety_store').select('*');
    if(!data) return;
    data.forEach(row => localStorage.setItem('safety_'+row.key, JSON.stringify(row.value)));
  }catch(e){ console.error('supaLoad 오류:', e); }
}
async function supaSync(key){
  if(!supaClient) return;
  try{
    const value = JSON.parse(localStorage.getItem('safety_'+key) || '[]');
    await supaClient.from('safety_store').upsert({key, value}, {onConflict:'key'});
  }catch(e){ console.error('supaSync 오류:', e); }
}

const DB = {
  get(key){ try{return JSON.parse(localStorage.getItem('safety_'+key))||[];}catch{return [];} },
  getObj(key){ try{return JSON.parse(localStorage.getItem('safety_'+key))||{};}catch{return {};} },
  set(key,val){ localStorage.setItem('safety_'+key, JSON.stringify(val)); supaSync(key); try{scheduleKVSync(key);}catch(e){} },
  push(key,item){ const arr=DB.get(key); arr.unshift(item); DB.set(key,arr); return arr; }
};

const TRACKED_KEYS = ['patrol','tbm','patrolCalendar','tbmCalendar','siteIssues'];
const CloudDB = (() => {
  function url(){ return DRIVE_UPLOAD_URL || ''; }
  function getJSONP(params){
    return new Promise((resolve,reject)=>{
      const U = url();
      if(!U){ reject(new Error('CloudDB URL not set')); return; }
      const cb = '_cb_' + Date.now() + '_' + Math.floor(Math.random()*1e6);
      const s = document.createElement('script');
      const to = setTimeout(()=>{ cleanup(); reject(new Error('JSONP timeout')); }, 30000);
      const cleanup = ()=>{ try{delete window[cb];}catch(e){} s.remove(); clearTimeout(to); };
      window[cb] = (data)=>{ cleanup(); resolve(data); };
      const q = Object.entries({...params, callback: cb})
        .map(([k,v])=>encodeURIComponent(k)+'='+encodeURIComponent(v)).join('&');
      s.src = U + '?' + q;
      s.onerror = ()=>{ cleanup(); reject(new Error('JSONP network error')); };
      document.body.appendChild(s);
    });
  }
  async function postJSON(body){
    const U = url();
    if(!U) throw new Error('CloudDB URL not set');
    const res = await fetch(U, {method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'}, body: JSON.stringify(body), redirect:'follow'});
    return res.json();
  }
  async function kvSet(key, value){ return postJSON({action:'kvSet', key, value}); }
  async function kvAll(){ const r = await getJSONP({action:'kvAll'}); return r.values || {}; }
  let hydrated = false;
  async function hydrate(){
    if(!url() || hydrated) return;
    try{
      const remote = await kvAll();
      ['tbm','tbmCalendar','patrol','patrolCalendar','siteIssues'].forEach(k => {
        const remoteVal = remote[k];
        const hasRemote = Array.isArray(remoteVal) ? remoteVal.length > 0
                       : (remoteVal && typeof remoteVal === 'object') ? Object.keys(remoteVal).length > 0
                       : !!remoteVal;
        if(hasRemote) localStorage.setItem('safety_'+k, JSON.stringify(remoteVal));
      });
      hydrated = true;
      renderTbmCalendar(); renderHistories();
      console.log('✅ CloudDB hydrated');
    }catch(e){ console.warn('CloudDB hydrate 실패:', e.message); }
  }
  return {url, kvSet, kvAll, hydrate};
})();

const _kvPending = {};
function scheduleKVSync(key){
  if(!TRACKED_KEYS.includes(key)) return;
  if(!CloudDB.url()) return;
  clearTimeout(_kvPending[key]);
  _kvPending[key] = setTimeout(async () => {
    try{
      const raw = localStorage.getItem('safety_'+key);
      let val = null;
      if(raw){ try{ val = JSON.parse(raw); }catch(e){} }
      await CloudDB.kvSet(key, val);
    }catch(e){ console.warn('시트 동기화 실패:', key, e.message); }
  }, 500);
}

// ============================================================
// TBM 테마
// ============================================================
const tbmThemes = {
  0:'🌅 일요일 — 주간 안전 점검 사항 공유',
  1:'⚙️ 월요일 테마: 설비·기계 점검 주간 — 각 기계 안전장치, 사출기, 프레스 이상 유무 집중 점검',
  2:'⛑️ 화요일 테마: 개인보호구(PPE) 점검 — 안전모·안전화·장갑·보안경 착용 상태 전원 확인',
  3:'💪 수요일 테마: 건강·피로 관리 — 수면 부족, 음주, 약물 복용 여부 확인 및 주의',
  4:'✨ 목요일 테마: 환경·정리정돈(5S) — 통로 확보, 폐기물 처리, 작업장 청결 집중 점검',
  5:'🚨 금요일 테마: 이번 주 아차사고·위험발견 사례 공유 — 무엇을 배웠나?',
  6:'📋 토요일 — 주간 마무리 안전 점검'
};
function renderTBMTheme(){
  const el = document.getElementById('tbm-today-theme');
  if(!el) return;
  const day = new Date().getDay();
  el.innerHTML = `<strong>📅 오늘의 TBM 테마</strong><br>${tbmThemes[day]}`;
}

// ============================================================
// TBM 달력
// ============================================================
function renderTbmCalendar(){
  const el = document.getElementById('tbm-calendar');
  if(!el) return;
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth();
  const todayDate = now.getDate();
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const dayNames = ['일','월','화','수','목','금','토'];
  const tbmData = DB.getObj('tbmCalendar');
  const monthKey = `${year}-${String(month+1).padStart(2,'0')}`;

  let doneCount = 0;
  for(let d=1; d<=daysInMonth; d++){
    const key = `${monthKey}-${String(d).padStart(2,'0')}`;
    if(tbmData[key] && tbmData[key].done) doneCount++;
  }

  let html = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
    <span style="font-size:14px;font-weight:700;color:#0d1f3c;">${year}년 ${month+1}월</span>
    <span style="font-size:12px;color:#6b7280;">실시: <strong style="color:#16a34a;">${doneCount}</strong> / ${daysInMonth}일</span>
  </div>`;
  html += '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;text-align:center;font-size:12px;">';
  dayNames.forEach((d,i)=> html += `<div style="font-weight:700;color:${i===0?'#dc2626':'#6b7280'};padding:4px 0;">${d}</div>`);
  for(let i=0; i<firstDay; i++) html += '<div></div>';
  for(let d=1; d<=daysInMonth; d++){
    const dow = (firstDay + d - 1) % 7;
    const key = `${monthKey}-${String(d).padStart(2,'0')}`;
    const dayData = tbmData[key];
    const isDone = dayData && dayData.done;
    const hasPhoto = dayData && dayData.photoName;
    const isToday = d === todayDate;
    const bg = isDone ? '#dcfce7' : isToday ? '#eef4ff' : '#fff';
    const border = isToday ? '2px solid #1e5096' : '1px solid #e8edf3';
    const icon = isDone ? (hasPhoto ? '📸' : '✅') : (d <= todayDate && dow!==0 && dow!==6 ? '⬜' : '');
    html += `<div onclick="openTbmDay(${d})" style="padding:6px 2px;border-radius:8px;background:${bg};border:${border};cursor:pointer;min-height:44px;position:relative;transition:all 0.15s;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform=''">
      <div style="font-size:12px;font-weight:${isToday?'800':'500'};color:${dow===0?'#dc2626':'#374151'};">${d}</div>
      <div style="font-size:14px;margin-top:1px;">${icon}</div>
    </div>`;
  }
  html += '</div>';
  el.innerHTML = html;
}

function openTbmDay(day){
  const now = new Date();
  const monthKey = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const key = `${monthKey}-${String(day).padStart(2,'0')}`;
  const tbmData = DB.getObj('tbmCalendar');
  const dayData = tbmData[key] || {};

  document.getElementById('tbm-day-form').style.display = 'block';
  document.getElementById('tbm-day-title').textContent = `${now.getMonth()+1}월 ${day}일 TBM 기록`;
  document.getElementById('tbm-day-done').checked = !!dayData.done;
  document.getElementById('tbm-health').checked = !!dayData.health;
  document.getElementById('tbm-ppe').checked = !!dayData.ppe;
  document.getElementById('tbm-risk').checked = !!dayData.risk;
  document.getElementById('tbm-day-agenda').value = dayData.agenda || '';
  const previewEl = document.getElementById('tbm-day-photo-preview');
  if(dayData.photoData){
    const link = dayData.photoDriveUrl ? `<a href="${dayData.photoDriveUrl}" target="_blank" style="font-size:10px;color:#1e5096;text-decoration:underline;display:block;margin-top:2px;">드라이브에서 보기 →</a>` : '';
    previewEl.innerHTML = `<img src="${dayData.photoData}" style="width:140px;height:100px;object-fit:cover;border-radius:8px;border:2px solid #16a34a;cursor:pointer;" onclick="openPhotoLightbox('${dayData.photoData}','${(dayData.photoName||'TBM 사진').replace(/'/g,'&apos;')}')" title="클릭하면 크게 보기"><div style="font-size:11px;color:#16a34a;margin-top:2px;">📎 ${dayData.photoName||''} <span style="color:#6b7280;">(클릭 = 크게 보기)</span></div>${link}`;
  } else if(dayData.photoName){
    const link = dayData.photoDriveUrl ? `<a href="${dayData.photoDriveUrl}" target="_blank" style="font-size:11px;color:#1e5096;text-decoration:underline;">드라이브에서 보기 →</a>` : '';
    previewEl.innerHTML = `<div style="font-size:12px;color:#16a34a;">📎 ${dayData.photoName}</div>${link}`;
  } else {
    previewEl.innerHTML = '';
  }
  document.getElementById('tbm-day-form').dataset.key = key;
  document.getElementById('tbm-day-form').scrollIntoView({behavior:'smooth', block:'start'});
}

// ============================================================
// 사진 압축 + 드라이브 업로드
// ============================================================
const MAX_PHOTO_BYTES = 200 * 1024;
function compressImage(file){
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const sizes = [1280, 1024, 900, 800, 700, 600, 500];
        const qualities = [0.75, 0.65, 0.55, 0.5, 0.45, 0.4];
        let result = null;
        outer: for(const maxDim of sizes){
          for(const q of qualities){
            const ratio = Math.min(1, maxDim / Math.max(img.width, img.height));
            const w = Math.round(img.width * ratio);
            const h = Math.round(img.height * ratio);
            const canvas = document.createElement('canvas');
            canvas.width = w; canvas.height = h;
            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
            const dataUrl = canvas.toDataURL('image/jpeg', q);
            const approxBytes = Math.ceil((dataUrl.length - 'data:image/jpeg;base64,'.length) * 3 / 4);
            if(approxBytes <= MAX_PHOTO_BYTES){ result = dataUrl; break outer; }
            result = dataUrl;
          }
        }
        resolve(result);
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function previewTbmDayPhoto(input){
  const preview = document.getElementById('tbm-day-photo-preview');
  if(!preview || !input.files.length) return;
  const file = input.files[0];
  const form = document.getElementById('tbm-day-form');
  const key = form?.dataset.key;
  if(!key){ alert('먼저 달력에서 날짜를 선택하세요.'); return; }

  preview.innerHTML = '<div style="font-size:11px;color:#1e5096;">압축 + 드라이브 업로드 중...</div>';
  compressImage(file).then(dataUrl => {
    const sizeKB = Math.ceil((dataUrl.length * 3 / 4) / 1024);
    const ext = (file.name.split('.').pop()||'jpg').toLowerCase();
    const newFileName = `TBM_${key}.${ext}`;
    preview.innerHTML = `<img src="${dataUrl}" style="width:140px;height:100px;object-fit:cover;border-radius:8px;border:2px solid #e5e7eb;">
      <div style="font-size:11px;color:#1e5096;margin-top:2px;">📤 ${newFileName} (${sizeKB}KB) — 업로드 중...</div>`;
    const base64 = dataUrl.split(',')[1];
    fetch(DRIVE_UPLOAD_URL, {
      method:'POST', mode:'no-cors',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({fileName:newFileName, fileData:base64, mimeType:'image/jpeg', subfolder:'TBM_사진'})
    }).then(()=>{
      const tbmData = DB.getObj('tbmCalendar');
      const cur = tbmData[key] || {};
      cur.photoName = newFileName;
      cur.photoData = dataUrl;
      cur.photoDriveUrl = 'https://drive.google.com/drive/folders/10a7V0ao6Qf-_9XeiK4Bd2NRmfAX7rgB5';
      cur.uploadedAt = new Date().toISOString();
      tbmData[key] = cur;
      DB.set('tbmCalendar', tbmData);
      preview.innerHTML = `<img src="${dataUrl}" style="width:140px;height:100px;object-fit:cover;border-radius:8px;border:2px solid #16a34a;cursor:pointer;" onclick="openPhotoLightbox('${dataUrl.replace(/'/g,'&apos;')}','${newFileName.replace(/'/g,'&apos;')}')" title="클릭하면 크게 보기">
        <div style="font-size:11px;color:#16a34a;margin-top:2px;">✅ ${newFileName} (${sizeKB}KB) — 드라이브 저장 완료 <span style="color:#6b7280;">(클릭 = 크게 보기)</span></div>
        <a href="${cur.photoDriveUrl}" target="_blank" style="font-size:10px;color:#1e5096;text-decoration:underline;">드라이브에서 보기 →</a>`;
      renderTbmCalendar();
    }).catch(err=>{
      preview.innerHTML = `<div style="font-size:12px;color:#dc2626;">❌ 업로드 실패: ${err.message||err}</div>`;
    });
  });
}

// ============================================================
// 저장
// ============================================================
function saveTbmDay(){
  const form = document.getElementById('tbm-day-form');
  const key = form.dataset.key;
  if(!key){ alert('날짜가 선택되지 않았습니다.'); return; }
  const tbmData = DB.getObj('tbmCalendar');
  const cur = tbmData[key] || {};
  const photoInput = document.getElementById('tbm-day-photo');
  const photoName = photoInput.files.length > 0 ? photoInput.files[0].name : (cur.photoName || '');
  tbmData[key] = {
    ...cur,
    done: document.getElementById('tbm-day-done').checked,
    health: document.getElementById('tbm-health').checked,
    ppe: document.getElementById('tbm-ppe').checked,
    risk: document.getElementById('tbm-risk').checked,
    agenda: document.getElementById('tbm-day-agenda').value,
    photoName: photoName,
    savedAt: new Date().toISOString()
  };
  DB.set('tbmCalendar', tbmData);

  // tbm 이력에도 (대시보드 recent-tbm · stat-tbm 가 읽음)
  if(tbmData[key].done){
    const existing = DB.get('tbm');
    const checks = [
      tbmData[key].done, tbmData[key].health, tbmData[key].ppe, tbmData[key].risk,
      false, false, false, false
    ];
    const checkedCount = checks.filter(Boolean).length;
    const filtered = existing.filter(r=>r.date!==key);
    filtered.unshift({
      id:Date.now(), date:key, time:'08:00', leader:'', count:0,
      place:'현장', notes:tbmData[key].agenda,
      checks, checkedCount, createdAt:new Date().toISOString()
    });
    DB.set('tbm', filtered);
  }

  alert('✅ TBM 기록 저장!\n\n메인 대시보드에도 자동 반영됩니다.');
  form.style.display = 'none';
  photoInput.value = '';
  renderTbmCalendar();
  renderHistories();
}

// ============================================================
// 이력
// ============================================================
function renderHistories(){
  const tbody = document.getElementById('tbm-history-body');
  if(!tbody) return;
  const data = DB.get('tbm');
  tbody.innerHTML = data.length===0
    ? '<tr><td colspan="5" style="text-align:center;color:#9ca3af;padding:20px;">기록 없음</td></tr>'
    : data.map(r=>`<tr>
        <td>${r.date}</td>
        <td>${r.leader||'-'}</td>
        <td>${r.count||'-'}${r.count?'명':''}</td>
        <td>${r.checkedCount||0}/8 <span class="badge ${r.checkedCount>=6?'green':r.checkedCount>=3?'yellow':'red'}">${r.checkedCount>=8?'완료':r.checkedCount>=3?'부분':'미흡'}</span></td>
        <td class="no-print"><button class="btn btn-outline btn-sm" onclick="deleteTbmRecord(${r.id})">삭제</button></td>
      </tr>`).join('');
}
function deleteTbmRecord(id){
  if(!confirm('이 이력을 삭제하시겠습니까?')) return;
  const arr = DB.get('tbm').filter(r=>r.id!==id);
  DB.set('tbm', arr);
  renderHistories();
}

// ============================================================
// 사진 Lightbox
// ============================================================
function openPhotoLightbox(src, caption){
  const lb = document.getElementById('photo-lightbox');
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox-caption').textContent = caption || '';
  lb.classList.add('show');
  document.body.style.overflow = 'hidden';
}
function closePhotoLightbox(){
  document.getElementById('photo-lightbox').classList.remove('show');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', (e) => {
  if(e.key === 'Escape') closePhotoLightbox();
});

// ============================================================
// INIT
// ============================================================
window.addEventListener('DOMContentLoaded', () => {
  const sup = DB.getObj('supabase');
  if(sup.url && sup.key) initSupabase(sup.url, sup.key);
  renderTBMTheme();
  renderTbmCalendar();
  renderHistories();
  setTimeout(() => CloudDB.hydrate(), 600);
  if(!supaClient){
    const txt = document.getElementById('conn-text');
    if(CloudDB.url() && txt) txt.textContent = '구글 시트 연동 중';
  }
  window.addEventListener('storage', (e) => {
    if(e.key === 'safety_tbm' || e.key === 'safety_tbmCalendar'){
      renderTbmCalendar(); renderHistories();
    }
  });
});
