function toggleRrPanel(empId) {
  // 다른 열린 패널 모두 닫기
  document.querySelectorAll('.rr-panel.open').forEach(p => {
    if (p.dataset.empId !== empId) p.classList.remove('open');
  });
  const panel = document.getElementById('rr-panel-' + empId);
  if (panel) panel.classList.toggle('open');
  // 패널 외부 클릭 시 닫기 (한 번만 등록)
  setTimeout(() => {
    const closer = (e) => {
      if (!e.target.closest('.rr-chip-wrap')) {
        document.querySelectorAll('.rr-panel.open').forEach(p => p.classList.remove('open'));
        document.removeEventListener('click', closer);
      }
    };
    document.addEventListener('click', closer);
  }, 0);
}

// ── 입력칸 자동 너비 조정 (한글=2, ASCII=1 기준) ──
function autoSizeInput(el) {
  const s = el.value || el.placeholder || '';
  const w = [...s].reduce((n, c) => n + (c.charCodeAt(0) > 127 ? 2 : 1), 0);
  el.size = Math.max(3, w + 1);
}

function confirmKpiItem(empId, idx) {
  if (!evalState[empId].kpiConfirmedItems) evalState[empId].kpiConfirmedItems = [];
  const cur = !!(evalState[empId].kpiConfirmedItems[idx]);
  const next = !cur;
  evalState[empId].kpiConfirmedItems[idx] = next;
  saveEvalState(empId);

  // ── 버튼 상태 갱신
  const btn = document.querySelector(`#krow-${idx} .btn-kpi-agree`);
  if (btn) {
    const emp2 = getEmp(empId);
    const originalTitle = (emp2?.kpi||[])[idx]?.title || '';
    const savedTitle    = (evalState[empId]?.kpiTitleOverrides||[])[idx];
    const isModified    = savedTitle !== undefined && savedTitle.trim() !== originalTitle.trim();
    btn.classList.toggle('agreed', next);
    btn.classList.toggle('modified', isModified);
    const agreeIcon = next ? '✓' : (isModified ? '✎' : '○');
    const agreeLbl  = next ? (isModified ? '수정<br>완료' : '합의<br>완료') : (isModified ? '수정' : '합의');
    btn.innerHTML = `<span class="agree-icon">${agreeIcon}</span><span class="agree-lbl">${agreeLbl}</span>`;
    const row = document.getElementById(`krow-${idx}`);
    if (row) {
      row.classList.toggle('confirmed-row', next && !isModified);
      row.classList.toggle('modified-row',  isModified);
    }
  }

  // ── 목표 수치 input 잠금 / 해제
  const input = document.getElementById(`kt-${idx}`);
  if (input) {
    if (next) {
      input.setAttribute('readonly', true);
      input.classList.add('locked');
    } else {
      input.removeAttribute('readonly');
      input.classList.remove('locked');
    }
  }

  // ── 5개 합의 달성 체크 ──
  const st2   = evalState[empId];
  const done2 = (st2.kpiConfirmedItems||[]).filter(Boolean).length;
  const kpiBanner = document.getElementById('kpi-agree-banner');
  if (done2 >= 5) {
    // 5개 완료 → 배너 표시 후 자동 이동
    if (kpiBanner) {
      kpiBanner.textContent = '✅ KPI 5개 합의 완료! 사훈 역량으로 이동합니다…';
      kpiBanner.className = 'kpi-agree-banner banner-ok';
      kpiBanner.style.display = 'block';
    }
    setTimeout(() => { switchTab('sahun', empId); }, 1200);
  } else if (done2 > 0) {
    // 진행 중 배너
    const need = 5 - done2;
    if (kpiBanner) {
      kpiBanner.textContent = `⏳ ${done2}개 합의됨 — 앞으로 ${need}개 더 합의하면 사훈 역량으로 넘어갑니다.`;
      kpiBanner.className = 'kpi-agree-banner banner-progress';
      kpiBanner.style.display = 'block';
    }
  } else {
    if (kpiBanner) kpiBanner.style.display = 'none';
  }

}
// ── 시급직 H항목 합의 확정 토글
function confirmHourlyItem(empId, idx) {
  if (!evalState[empId].itemConfirmed) evalState[empId].itemConfirmed = [];
  const cur  = !!(evalState[empId].itemConfirmed[idx]);
  const next = !cur;
  evalState[empId].itemConfirmed[idx] = next;
  saveEvalState(empId);

  const btn = document.querySelector(`#hrow-${idx} .btn-kpi-agree`);
  if (btn) {
    btn.classList.toggle('agreed', next);
    btn.textContent = next ? '✓ 합의 완료' : '합의';
  }
  const input = document.getElementById(`ht-${idx}`);
  if (input) {
    if (next) { input.setAttribute('readonly', true);  input.classList.add('locked'); }
    else      { input.removeAttribute('readonly');      input.classList.remove('locked'); }
  }
  const row = document.getElementById(`hrow-${idx}`);
  if (row) row.classList.toggle('confirmed-row', next);
}
function saveHourlyTarget(empId, idx, val) {
  if (!evalState[empId].itemTargets) evalState[empId].itemTargets = [];
  evalState[empId].itemTargets[idx] = val;
  saveEvalState(empId);
}
function saveHourlyRequest(empId, idx, val) {
  if (!evalState[empId].itemRequests) evalState[empId].itemRequests = [];
  evalState[empId].itemRequests[idx] = val;
  saveEvalState(empId);
}

function toggleKpiConfirmMode(empId) {
  kpiConfirmMode = !kpiConfirmMode;
  renderDetail(getEmp(empId));
}
function confirmKpiTargets(empId) {
  evalState[empId].kpiConfirmed = true;
  kpiConfirmMode = false;
  saveEvalState(empId);
  alert('KPI 목표가 확정되었습니다.');
  renderDetail(getEmp(empId));
}

function refreshScoreHeader(empId) {
  const emp = getEmp(empId);
  if (!emp) return;
  const st = evalState[empId];
  const score = calcTotalScore(st, emp);
  const gc = gradeFromScore(score);
  const fill = document.querySelector('.prog-fill');
  const txt  = document.querySelector('.edh-prog-txt');
  if (fill) fill.style.width = Math.min(100, score)+'%';
  if (txt)  txt.innerHTML = score>0
    ? `<span class="grade-badge-sm ${GRADE_CLS[gc]}">${GRADE_LABEL[gc]}</span> ${score}점 / 100점`
    : '평가 미입력';
}

function saveEvalState(empId) {
  try {
    // textarea 값 먼저 flush
    document.querySelectorAll('textarea,input').forEach(el => el.dispatchEvent(new Event('blur')));
    localStorage.setItem(`ssat_eval_2026_${empId}`, JSON.stringify(evalState[empId]));
    const btn = event && event.target;
    if (btn) { const orig = btn.textContent; btn.textContent='✓ 저장됨'; setTimeout(()=>btn.textContent=orig,1200); }
    // Sheets 백그라운드 저장 (GAS_ENABLED=true 일 때만 동작, 로컬에 영향 없음)
    gasSave(empId, evalState[empId])
      .then(() => updateGasBadge('ok'))
      .catch(() => updateGasBadge('error'));
  } catch(e) { alert('저장 실패: '+e.message); }
}
function showFinalConfirm(empId) {
  const emp = getEmp(empId);
  const st  = evalState[empId];
  const kpiDone   = (st.kpiConfirmedItems||[]).filter(Boolean).length;
  const sahunDone = (st.sahunConfirmed||[]).filter(Boolean).length;
  let warnLines = [];
  if (!emp.isHourly && kpiDone < 5)   warnLines.push(`⚠️ KPI 합의 ${kpiDone}/5개 — 5개를 모두 합의했는지 확인하세요.`);
  if (sahunDone < 3)                  warnLines.push(`⚠️ 사훈 확정 ${sahunDone}/3항목 — 3항목을 모두 확정했는지 확인하세요.`);
  const warnText = warnLines.length ? '\n\n' + warnLines.join('\n') : '';
  const summary  = emp.isHourly
    ? `[${emp.name} ${emp.position}] 2026 성과관리\n사훈 확정: ${sahunDone}/3항목`
    : `[${emp.name} ${emp.position}] 2026 성과관리\nKPI 합의: ${kpiDone}/5개 · 사훈 확정: ${sahunDone}/3항목`;
  const msg = `${summary}${warnText}\n\n이 내용으로 최종 저장하시겠습니까?\n저장 후에는 KPI·사훈 합의 내용이 확정됩니다.`;
  if (!confirm(msg)) return;
  evalState[empId].submitted   = true;
  evalState[empId].submittedAt = new Date().toISOString();
  saveEvalState(empId);
  renderSidebar();
  renderDetail(emp);
  if (GAS_ENABLED) {
    updateGasBadge('connecting');
    gasSave(empId, evalState[empId])
      .then(() => { updateGasBadge('ok'); alert('최종 저장 완료! 담당 팀장이 검토 후 안내드립니다.'); })
      .catch(() => { updateGasBadge('error'); alert('로컬 저장 완료 (Sheets 연동 실패).'); });
  } else {
    alert('최종 저장이 완료되었습니다.');
  }
}
function submitEval(empId) { showFinalConfirm(empId); }


// ════════════════════════════════════════
//  ADMIN MODAL
// ════════════════════════════════════════
function openAdminModal() {
  if (!currentUser || !currentUser.isLeader) { alert('팀장만 접근 가능합니다.'); return; }
  renderAdminBody();
  document.getElementById('admin-modal').classList.add('open');
}
function renderAdminBody() {
  let rows = EMPLOYEES.map(e => `
  <div class="aer">
    <div class="emp-av ${avatarBg(e)}" style="width:32px;height:32px;font-size:12px;flex-shrink:0;">${getInitials(e.name)}</div>
    <div style="flex:1;">
      <div class="aer-name">${e.name} <span style="font-weight:500;color:var(--text2);">(${e.no})</span></div>
      <div class="aer-meta">${e.team} · ${e.position} · ${e.contractType}</div>
    </div>
    <button class="aer-btn" onclick="openEditEmployee('${e.id}')">편집</button>
    <button class="aer-btn del" onclick="deleteEmployee('${e.id}')">삭제</button>
  </div>`).join('');
  document.getElementById('admin-body').innerHTML = `
  <div class="admin-list">${rows}</div>
  <div class="json-panel">
    <h4>📥 JSON 가져오기 / 내보내기</h4>
    <textarea id="json-export-area" placeholder="JSON 데이터...">${JSON.stringify(EMPLOYEES, null, 2)}</textarea>
    <div class="json-btns">
      <button class="btn-outline" onclick="exportJson()">현재 데이터 복사</button>
      <button class="btn-primary" onclick="importJson()">JSON 가져오기 (적용)</button>
    </div>
  </div>`;
}
function exportJson() {
  const ta = document.getElementById('json-export-area');
  ta.value = JSON.stringify(EMPLOYEES, null, 2);
  ta.select();
  try { document.execCommand('copy'); alert('클립보드에 복사되었습니다.'); } catch(e) {}
}
function importJson() {
  const val = document.getElementById('json-export-area').value;
  try {
    const parsed = JSON.parse(val);
    if (!Array.isArray(parsed)) { alert('배열 형식의 JSON이 필요합니다.'); return; }
    if (!confirm(`${parsed.length}명 직원 데이터를 가져옵니다. 계속하시겠습니까?`)) return;
    EMPLOYEES = parsed; saveEmployees(); renderSidebar(); renderAdminBody();
    alert('완료.');
  } catch(e) { alert('JSON 오류: '+e.message); }
}
function deleteEmployee(id) {
  const emp = getEmp(id);
  if (!emp || !confirm(`[${emp.name}]을 삭제합니까?`)) return;
  EMPLOYEES = EMPLOYEES.filter(e=>e.id!==id);
  saveEmployees(); renderSidebar(); renderAdminBody();
  if (selectedEmpId === id) {
    selectedEmpId = null;
    document.getElementById('content-area').innerHTML = '<div class="empty-state"><div class="es-ic">👈</div><div class="es-txt">왼쪽에서 직원을 선택하세요</div></div>';
  }
}
let editingEmpId = null;
function addNewEmployee() {
  editingEmpId = null;
  document.getElementById('edit-modal-title').textContent = '+ 직원 추가';
  renderEditForm(null);
  document.getElementById('edit-modal').classList.add('open');
}
function openEditEmployee(id) {
  editingEmpId = id;
  const emp = getEmp(id);
  document.getElementById('edit-modal-title').textContent = `편집: ${emp.name}`;
  renderEditForm(emp);
  document.getElementById('edit-modal').classList.add('open');
}
function renderEditForm(emp) {
  const v = (f, def='') => emp ? (emp[f]||def) : def;
  document.getElementById('edit-body').innerHTML = `
  <div class="fs-title">기본 정보</div>
  <div class="form-grid">
    <div class="ff"><label>사번 (ID)</label><input id="fe-id" value="${v('id')}" placeholder="예: pjs" ${emp?'readonly':''}></div>
    <div class="ff"><label>사번 번호</label><input id="fe-no" value="${v('no')}" placeholder="예: SS-2025"></div>
    <div class="ff"><label>이름</label><input id="fe-name" value="${v('name')}" placeholder="이름"></div>
    <div class="ff"><label>직위</label><input id="fe-pos" value="${v('position')}" placeholder="예: 대리"></div>
    <div class="ff"><label>팀</label><input id="fe-team" value="${v('team')}" placeholder="예: 경영지원팀"></div>
    <div class="ff"><label>계약유형</label>
      <select id="fe-ct">
        <option ${v('contractType')==='연봉직'?'selected':''}>연봉직</option>
        <option ${v('contractType')==='시급직'?'selected':''}>시급직</option>
      </select>
    </div>
    <div class="ff"><label>입사일</label><input id="fe-join" type="date" value="${v('joinDate')}"></div>
    <div class="ff"><label>옵션</label>
      <div style="display:flex;gap:12px;align-items:center;padding-top:8px;">
        <label style="display:flex;gap:5px;align-items:center;font-size:12px;text-transform:none;letter-spacing:0;font-weight:500;">
          <input type="checkbox" id="fe-leader" ${v('isLeader')?'checked':''}> 팀장
        </label>
        <label style="display:flex;gap:5px;align-items:center;font-size:12px;text-transform:none;letter-spacing:0;font-weight:500;">
          <input type="checkbox" id="fe-hourly" ${v('isHourly')?'checked':''}> 시급직
        </label>
      </div>
    </div>
    <div class="ff full"><label>R&R</label><textarea id="fe-rr" style="min-height:60px;">${v('rr')}</textarea></div>
  </div>`;
  document.getElementById('edit-foot').innerHTML = `
  <button class="mf-btn mf-cancel" onclick="closeModal('edit-modal')">취소</button>
  ${emp?`<button class="mf-btn mf-del" onclick="deleteEmployee('${emp.id}');closeModal('edit-modal')">삭제</button>`:''}
  <button class="mf-btn mf-save" onclick="saveEditForm()">저장</button>`;
}
function saveEditForm() {
  const id = document.getElementById('fe-id').value.trim();
  if (!id) { alert('사번(ID) 입력 필요'); return; }
  const data = {
    id, no: document.getElementById('fe-no').value.trim(),
    name: document.getElementById('fe-name').value.trim(),
    position: document.getElementById('fe-pos').value.trim(),
    team: document.getElementById('fe-team').value.trim(),
    contractType: document.getElementById('fe-ct').value,
    joinDate: document.getElementById('fe-join').value,
    isLeader: document.getElementById('fe-leader').checked,
    isHourly: document.getElementById('fe-hourly').checked,
    rr: document.getElementById('fe-rr').value.trim(),
    kpi:[], sahun:[], items:[],
  };
  if (!data.name) { alert('이름 필수'); return; }
  const idx = EMPLOYEES.findIndex(e=>e.id===id);
  if (idx >= 0) {
    data.kpi = EMPLOYEES[idx].kpi||[];
    data.sahun = EMPLOYEES[idx].sahun||[];
    data.items = EMPLOYEES[idx].items||[];
    EMPLOYEES[idx] = {...EMPLOYEES[idx],...data};
  } else { EMPLOYEES.push(data); }
  saveEmployees(); renderSidebar(); renderAdminBody(); closeModal('edit-modal');
  alert('저장되었습니다.');
}
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.overlay').forEach(o => {
  o.addEventListener('click', function(e) { if (e.target === this) this.classList.remove('open'); });
});

// ── KPI 풀 선택 헬퍼 ─────────────────────────────
function getKpiPoolSel(empId) {
  try { return JSON.parse(localStorage.getItem('ssat_pool_'+empId)||'[]'); }
  catch(e) { return []; }
}
function getActiveKpi(emp) {
  const pool = emp.kpiPool || [];
  const sel  = getKpiPoolSel(emp.id);
  const extra = pool
    .map((p,i) => sel[i] ? {...p, fromPool:true} : null)
    .filter(Boolean);
  return [...(emp.kpi||[]), ...extra];
}
function toggleKpiPool(empId, poolIdx, el) {
  const sel = getKpiPoolSel(empId);
  const checked = el.checked;
  const count = sel.filter(Boolean).length;
  if (checked && count >= 2) {
    alert('추가 KPI 후보는 최대 2개까지 선택할 수 있습니다.');
    el.checked = false;
    return;
  }
  sel[poolIdx] = checked;
  localStorage.setItem('ssat_pool_'+empId, JSON.stringify(sel));
  renderDetail(getEmp(empId));
}
// init


function saveKpiFb(empId, val) {
  const st = evalState[empId]||{};
  st.kpiFb = val;
  evalState[empId] = st;
}
function addKpiModRequest(empId, inputId) {
  const el = document.getElementById(inputId);
  if (!el) return;
  const text = el.value.trim();
  if (!text) { el.focus(); return; }
  const st = evalState[empId]||{};
  if (!st.kpiModLog) st.kpiModLog = [];
  const now = new Date();
  const dateStr = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');
  const timeStr = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  st.kpiModLog.push({date:dateStr, time:timeStr, text:text, author:currentUser.name||currentUser.id});
  evalState[empId] = st;
  saveEvalState(empId);
  el.value = '';
  renderDetail(getEmp(empId));
}
function deleteKpiModRequest(empId, idx) {
  const st = evalState[empId]||{};
  if (!st.kpiModLog) return;
  if (!confirm('이 수정 요청 기록을 삭제하시겠습니까?')) return;
  st.kpiModLog.splice(idx, 1);
  evalState[empId] = st;
  saveEvalState(empId);
  renderDetail(getEmp(empId));
}
function saveSahunSharedFb(empId, val) {
  const st = evalState[empId]||{};
  st.sahunSharedFb = val;
  evalState[empId] = st;
}
</script>
