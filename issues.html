<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>지적사항 관리 | 산업안전보건</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
html{scrollbar-gutter:stable;}
body{font-family:'Noto Sans KR','Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#f5f5f4;color:#1c1917;min-height:100vh;font-size:14px;}

.page-header{background:#0d1f3c;color:#fff;padding:20px 18px 18px;border-bottom:3px solid #1a3a6e;position:relative;}
@media(min-width:600px){.page-header{padding:24px 28px 20px;}}
.page-header .doc-no{display:inline-block;font-size:11px;font-weight:700;letter-spacing:0.18em;padding:2px 10px;border:1px solid rgba(255,255,255,0.3);border-radius:2px;margin-bottom:10px;color:rgba(255,255,255,0.85);}
.page-header h1{font-size:22px;font-weight:900;letter-spacing:-0.02em;}
.page-header .sub{font-size:13px;opacity:0.75;margin-top:4px;}
.page-header .conn{position:absolute;top:16px;right:18px;font-size:11px;background:rgba(255,255,255,0.1);padding:4px 10px;border-radius:8px;display:flex;align-items:center;gap:6px;}
.page-header .stats-row{margin-top:14px;display:flex;gap:8px;flex-wrap:wrap;}
.page-header .stats-row .pill{background:rgba(255,255,255,0.12);color:#fff;font-size:13px;padding:6px 12px;border-radius:4px;font-weight:700;border:1px solid rgba(255,255,255,0.22);letter-spacing:0.02em;}
.page-header .stats-row .pill.open{background:rgba(255,255,255,0.18);}
.page-header .stats-row .pill.done{background:rgba(255,255,255,0.08);opacity:0.85;}
.conn-dot{width:8px;height:8px;border-radius:50%;background:#64748b;}
.conn-dot.connected{background:#e5e7eb;animation:pulse 2s infinite;}
.conn-dot.error{background:#ef4444;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}

.container{max-width:840px;margin:0 auto;padding:16px 14px 60px;}
@media(min-width:600px){.container{padding:22px 20px 60px;}}

.card{background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:22px 18px;margin-bottom:14px;box-shadow:none;}
@media(min-width:600px){.card{padding:28px 28px;}}
.card-title{font-size:22px;font-weight:900;color:#1a3a6e;margin-bottom:20px;padding:2px 0 12px 16px;border-left:5px solid #0d1f3c;border-bottom:2px solid #1a3a6e;letter-spacing:-0.025em;line-height:1.25;display:flex;justify-content:space-between;align-items:baseline;gap:10px;flex-wrap:wrap;}
.card-title .sub-count{font-size:14px;font-weight:500;color:#64748b;letter-spacing:normal;}

.section-title{font-size:13px;font-weight:800;letter-spacing:0.22em;color:#1a3a6e;padding:10px 14px;margin:22px 0 14px;background:#f1f5f9;border-left:4px solid #1a3a6e;border-bottom:1px solid #cbd5e1;text-transform:uppercase;}
.section-title:first-of-type{margin-top:4px;}

.btn{display:inline-block;padding:10px 18px;background:#0d1f3c;color:#fff;border:none;border-radius:4px;font-size:13px;font-weight:700;cursor:pointer;text-decoration:none;transition:background 0.15s;letter-spacing:0.03em;font-family:inherit;}
.btn:hover{background:#1a3a6e;}
.btn-outline{background:#fff;color:#0d1f3c;border:1px solid #cbd5e1;}
.btn-outline:hover{background:#f5f5f4;border-color:#64748b;}
.btn-sm{padding:7px 12px;font-size:12px;}
.btn-primary-big{width:100%;padding:16px 24px;font-size:15px;font-weight:800;letter-spacing:0.25em;text-transform:uppercase;margin-top:6px;}

/* 입력 폼 */
label.field{display:block;margin-bottom:16px;}
label.field > .lb{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:700;color:#64748b;margin-bottom:8px;letter-spacing:-0.01em;}
label.field > .lb .no{display:inline-flex;align-items:center;justify-content:center;min-width:32px;height:22px;padding:0 7px;background:#fafbfc;border:1px solid #e5e7eb;color:#cbd5e1;font-size:11px;font-weight:800;letter-spacing:0.08em;border-radius:4px;}
label.field.filled > .lb{color:#1a3a6e;}
label.field.filled > .lb .no{background:#1a3a6e;color:#fff;border-color:#1a3a6e;}
input[type="text"], input[type="date"], select, textarea{
  width:100%;border:1px solid #e5e7eb;border-radius:8px;padding:13px 14px;font-size:17px;font-family:inherit;
  background:#fff;color:#1a3a6e;transition:border-color 0.15s;-webkit-appearance:none;
}
select{-webkit-appearance:listbox;}
input:focus, select:focus, textarea:focus{outline:none;border-color:#1a3a6e;}
textarea{resize:vertical;min-height:92px;line-height:1.55;}

.warn-banner{background:#fefce8;border:1px solid #e4dcc5;border-left:3px solid #a16207;border-radius:8px;padding:12px 14px;font-size:13px;color:#713f12;margin-bottom:14px;display:none;line-height:1.6;}
.warn-banner.show{display:block;}

/* 필터 바 */
.filter-bar{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.filter-chip{padding:8px 14px;border:1px solid #e5e7eb;background:#fff;color:#57534e;font-size:13px;font-weight:700;border-radius:4px;cursor:pointer;font-family:inherit;letter-spacing:0.02em;}
.filter-chip:hover{background:#fafbfc;}
.filter-chip.active{background:#1a3a6e;color:#fff;border-color:#1a3a6e;}

/* 지적사항 카드 */
.issue-list{display:flex;flex-direction:column;gap:10px;}
.issue-item{border:1px solid #e5e7eb;border-left:4px solid #0d1f3c;border-radius:8px;padding:16px 16px 14px;background:#fff;transition:all 0.15s;}
.issue-item.done{border-left-color:#cbd5e1;background:#fafbfc;}
.issue-item .ii-head{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px;padding-bottom:10px;border-bottom:1px dashed #e5e7eb;}
.issue-item .ii-no{font-size:12px;font-weight:800;letter-spacing:0.12em;color:#0d1f3c;padding:3px 9px;background:#f1f5f9;border-radius:2px;}
.issue-item .ii-site{font-size:12px;font-weight:700;color:#0d1f3c;padding:3px 9px;background:#fff;border:1px solid #e5e7eb;border-radius:2px;}
.issue-item .ii-date{font-size:13px;color:#64748b;font-weight:500;}
.issue-item .ii-del{margin-left:auto;background:none;border:none;color:#cbd5e1;cursor:pointer;font-size:22px;line-height:1;padding:0 6px;}
.issue-item .ii-del:hover{color:#991b1b;}
.issue-item .ii-desc{font-size:17px;font-weight:700;color:#1a3a6e;line-height:1.5;margin-bottom:8px;word-break:break-word;}
.issue-item.done .ii-desc{text-decoration:line-through;color:#64748b;text-decoration-thickness:1.5px;}
.issue-item .ii-loc{font-size:14px;color:#57534e;margin-bottom:12px;line-height:1.4;}
.issue-item .ii-loc .k{display:inline-block;font-size:11px;font-weight:800;letter-spacing:0.12em;color:#64748b;padding:2px 7px;border:1px solid #e5e7eb;background:#fff;border-radius:2px;margin-right:6px;text-transform:uppercase;}
.issue-item .ii-check{display:flex;align-items:center;gap:12px;padding:12px 14px;background:#fafbfc;border:1px solid #e5e7eb;border-radius:4px;margin-bottom:10px;cursor:pointer;user-select:none;}
.issue-item.done .ii-check{background:#f5f5f4;}
.issue-item .ii-check input{width:22px;height:22px;accent-color:#0d1f3c;cursor:pointer;flex-shrink:0;}
.issue-item .ii-check .cl{font-size:15px;font-weight:700;color:#1a3a6e;}
.issue-item .ii-check .cr{margin-left:auto;font-size:12px;color:#64748b;font-weight:500;}
.issue-item .ii-check .cr strong{color:#0d1f3c;font-weight:700;}
.issue-item .ii-memo-wrap{margin-bottom:10px;}
.issue-item .ii-memo-wrap .ml{font-size:12px;font-weight:800;letter-spacing:0.12em;color:#64748b;margin-bottom:5px;text-transform:uppercase;}
.issue-item .ii-memo{width:100%;padding:10px 12px;font-size:15px;border:1px solid #e5e7eb;border-radius:4px;font-family:inherit;background:#fff;color:#1a3a6e;min-height:42px;resize:vertical;line-height:1.5;}
.issue-item .ii-memo:focus{outline:none;border-color:#1a3a6e;}
.issue-item .ii-footer{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.issue-item .attach-btn{background:#fff;border:1px solid #cbd5e1;color:#0d1f3c;padding:8px 14px;font-size:13px;font-weight:700;border-radius:4px;cursor:pointer;font-family:inherit;}
.issue-item .attach-btn:hover{background:#f5f5f4;}
.issue-item .attach-btn .attach-cnt{display:inline-block;margin-left:4px;padding:1px 7px;background:#0d1f3c;color:#fff;font-size:11px;border-radius:2px;font-weight:800;letter-spacing:0.05em;}
.issue-item .attach-btn.empty .attach-cnt{background:#cbd5e1;}

.empty-state{text-align:center;padding:40px 20px;color:#cbd5e1;font-size:14px;}

/* 라이트박스 */
.photo-lightbox{position:fixed;inset:0;background:rgba(28,25,23,0.9);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px;cursor:zoom-out;}
.photo-lightbox.show{display:flex;}
.photo-lightbox img{max-width:95%;max-height:92vh;object-fit:contain;border-radius:8px;box-shadow:0 4px 24px rgba(0,0,0,0.5);}
.photo-lightbox .close-btn{position:absolute;top:16px;right:20px;background:rgba(255,255,255,0.15);color:#fff;border:none;width:44px;height:44px;border-radius:50%;font-size:22px;cursor:pointer;}

/* 파일 모달 */
.files-modal{position:fixed;inset:0;background:rgba(28,25,23,0.6);z-index:900;display:none;align-items:flex-start;justify-content:center;padding:30px 16px;overflow-y:auto;}
.files-modal.show{display:flex;}
.files-modal-inner{background:#fff;border:1px solid #1a3a6e;border-radius:8px;padding:22px;max-width:560px;width:100%;max-height:85vh;overflow-y:auto;}
.files-modal-title{font-size:16px;font-weight:900;color:#1a3a6e;margin-bottom:14px;padding-bottom:12px;border-bottom:2px solid #1a3a6e;display:flex;justify-content:space-between;align-items:center;}
.files-modal-title .t-text{flex:1;line-height:1.3;}
.files-modal-close{background:none;border:none;font-size:24px;cursor:pointer;color:#64748b;padding:0 4px;line-height:1;}
.file-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border:1px solid #e5e7eb;border-radius:4px;margin-bottom:7px;background:#fafbfc;}
.file-item .fi-icon{font-size:22px;flex-shrink:0;}
.file-item .fi-info{flex:1;min-width:0;}
.file-item .fi-name{font-size:14px;font-weight:700;color:#1a3a6e;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.file-item .fi-meta{font-size:11px;color:#64748b;margin-top:2px;}
.file-item .fi-actions{display:flex;gap:4px;flex-shrink:0;}
.file-item .fi-actions button, .file-item .fi-actions a{padding:6px 12px;font-size:12px;border-radius:4px;border:none;cursor:pointer;text-decoration:none;font-weight:700;}
.file-item .view-btn{background:#1a3a6e;color:#fff;}
.file-item .del-btn{background:#fef2f2;color:#991b1b;border:1px solid #e7d3d3;}
.file-empty{text-align:center;color:#cbd5e1;padding:20px;font-size:13px;}

.files-modal-uploader{border-top:1px dashed #e5e7eb;padding-top:14px;margin-top:14px;}
.files-modal-uploader .up-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.files-modal-uploader .up-btn{display:block;text-align:center;padding:14px 10px;border:2px dashed #cbd5e1;border-radius:4px;background:#fff;cursor:pointer;font-size:13px;font-weight:700;color:#0d1f3c;letter-spacing:0.02em;}
.files-modal-uploader .up-btn:hover{border-color:#1a3a6e;background:#fafbfc;}
.files-modal-uploader .up-btn.cam{border-style:solid;border-color:#0d1f3c;}
.files-modal-uploader .up-btn input{display:none;}
.files-modal-uploader .up-hint{font-size:11px;color:#64748b;line-height:1.5;}

@media print{
  .no-print{display:none!important;}
  body{background:#fff;}
  .card{border:1px solid #000!important;break-inside:avoid;}
  @page{size:A4 portrait;margin:10mm;}
}
</style>
</head>
<body>

<div class="page-header">
  <div class="conn no-print"><span id="conn-dot" class="conn-dot"></span><span id="conn-text">연결 확인 중...</span></div>
  <div class="doc-no">ISS-FORM</div>
  <h1>지적사항 관리</h1>
  <div class="sub">현장 점검 · 개선 여부 기록 · 누적 추적 · 다중 첨부파일</div>
  <div class="stats-row">
    <span class="pill open" id="stat-open">미완료 0건</span>
    <span class="pill done" id="stat-done">완료 0건</span>
  </div>
</div>

<div class="photo-lightbox" id="photo-lightbox" onclick="closePhotoLightbox()">
  <button class="close-btn" onclick="event.stopPropagation();closePhotoLightbox()">✕</button>
  <img id="lightbox-img" src="" alt="">
</div>

<!-- 첨부파일 모달 -->
<div class="files-modal" id="files-modal" onclick="if(event.target.id==='files-modal') closeFilesModal()">
  <div class="files-modal-inner">
    <div class="files-modal-title">
      <span class="t-text" id="files-modal-title-text">첨부파일</span>
      <button class="files-modal-close" onclick="closeFilesModal()">✕</button>
    </div>
    <div id="files-modal-list"></div>
    <div class="files-modal-uploader">
      <div class="up-btns">
        <label class="up-btn cam">
          + 사진 촬영
          <input type="file" accept="image/*" capture="environment" onchange="addIssueFiles(this)">
        </label>
        <label class="up-btn">
          + 파일 선택
          <input type="file" multiple onchange="addIssueFiles(this)">
        </label>
      </div>
      <div class="up-hint">사진·PDF·엑셀·문서 등 여러 개 첨부 가능 (각 50MB 이하)</div>
    </div>
  </div>
</div>

<div class="container">

  <div id="warn-no-supa" class="warn-banner">
    <strong>※ 실시간 공유 연결 실패.</strong> 관리자에게 문의해주세요.
  </div>

  <!-- 지적사항 등록 -->
  <div class="card">
    <div class="card-title">지적사항 등록</div>
    <label class="field">
      <span class="lb"><span class="no">01</span> 사업장</span>
      <select id="iss-site">
        <option value="suwon">수원</option>
        <option value="hwaseong">화성</option>
      </select>
    </label>
    <label class="field">
      <span class="lb"><span class="no">02</span> 지적사항 내용</span>
      <textarea id="iss-desc" placeholder="예: 사출기 3번 안전문 고정핀 파손"></textarea>
    </label>
    <label class="field">
      <span class="lb"><span class="no">03</span> 위치</span>
      <input type="text" id="iss-location" placeholder="예: 3층 사출실">
    </label>
    <button class="btn btn-primary-big" onclick="addSiteIssue()">등록</button>
  </div>

  <!-- 지적사항 목록 -->
  <div class="card">
    <div class="card-title">지적사항 목록 <span class="sub-count" id="list-count"></span></div>

    <div class="filter-bar no-print">
      <button type="button" class="filter-chip active" data-filter="all" onclick="setFilter('all',this)">전체</button>
      <button type="button" class="filter-chip" data-filter="open" onclick="setFilter('open',this)">미완료</button>
      <button type="button" class="filter-chip" data-filter="done" onclick="setFilter('done',this)">완료</button>
      <button type="button" class="filter-chip" data-filter="suwon" onclick="setFilter('suwon',this)">수원</button>
      <button type="button" class="filter-chip" data-filter="hwaseong" onclick="setFilter('hwaseong',this)">화성</button>
    </div>

    <div class="issue-list" id="issue-list"></div>
  </div>

  <div style="text-align:center;color:#cbd5e1;font-size:11px;margin-top:30px;">
    © 신성오토텍 안전환경팀 · 지적사항 관리
  </div>

</div>

<script>
// ============================================================
// Supabase
// ============================================================
const DEFAULT_SUPABASE_URL = 'https://onohwrswzaiwbabiusrj.supabase.co';
const DEFAULT_SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9ub2h3cnN3emFpd2JhYml1c3JqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMjQ5MTgsImV4cCI6MjA4OTgwMDkxOH0.vK_l0iWBJyZmLwzNfQHob2ejEZGfg8mQ8mV-6-lXaN0';
let supaClient = null;

const DB = {
  get(key){ try{return JSON.parse(localStorage.getItem('safety_'+key))||[];}catch{return [];} },
  getObj(key){ try{return JSON.parse(localStorage.getItem('safety_'+key))||{};}catch{return {};} },
  async set(key, val){
    localStorage.setItem('safety_'+key, JSON.stringify(val));
    if(!supaClient) return;
    try{ await supaClient.from('safety_store').upsert({key, value:val}, {onConflict:'key'}); }
    catch(e){ console.error('Supabase upsert 실패:', key, e); }
  }
};

function _isEmptySafetyValue(v){
  if(v === null || v === undefined) return true;
  if(Array.isArray(v)) return v.length === 0;
  if(typeof v === 'object') return Object.keys(v).length === 0;
  return false;
}
async function loadFromSupabase(){
  if(!supaClient) return;
  try{
    const {data, error} = await supaClient.from('safety_store').select('*');
    if(error) throw error;
    if(data) data.forEach(row => {
      const localRaw = localStorage.getItem('safety_'+row.key);
      if(_isEmptySafetyValue(row.value) && localRaw){
        try{
          const localVal = JSON.parse(localRaw);
          if(!_isEmptySafetyValue(localVal)){
            console.warn('[supaLoad 가드]', row.key, '원격 빈 값 → 로컬 보존');
            return;
          }
        }catch(e){}
      }
      localStorage.setItem('safety_'+row.key, JSON.stringify(row.value));
    });
  }catch(e){ console.error('supaLoad:', e); }
}
function initSupabase(url, key){
  try{
    supaClient = supabase.createClient(url, key);
    document.getElementById('conn-dot').className = 'conn-dot connected';
    document.getElementById('conn-text').textContent = '실시간 공유 연결됨';
    document.getElementById('warn-no-supa').classList.remove('show');
    supaClient.channel('issues_sync')
      .on('postgres_changes', {event:'*', schema:'public', table:'safety_store'}, async () => {
        await loadFromSupabase();
        renderSiteIssues();
        const modal = document.getElementById('files-modal');
        if(modal.classList.contains('show') && modal.dataset.issueId){
          renderIssueFiles(parseInt(modal.dataset.issueId, 10));
        }
      })
      .subscribe();
    return true;
  }catch(e){
    console.error('Supabase 연결 실패:', e);
    document.getElementById('conn-dot').className = 'conn-dot error';
    document.getElementById('conn-text').textContent = '연결 실패';
    document.getElementById('warn-no-supa').classList.add('show');
    return false;
  }
}

async function uploadToStorage(file, subfolder){
  if(!supaClient) throw new Error('Supabase 미연결');
  const ts = Date.now();
  const safeName = file.name.replace(/[^a-zA-Z0-9가-힣._-]/g, '_');
  const path = `${subfolder}/${ts}_${safeName}`;
  const {error} = await supaClient.storage.from('safety-files').upload(path, file, {
    contentType: file.type || 'application/octet-stream', upsert: false
  });
  if(error) throw error;
  const {data:urlData} = supaClient.storage.from('safety-files').getPublicUrl(path);
  return {name:file.name, url:urlData.publicUrl, path, mime:file.type||'application/octet-stream', size:file.size, uploadedAt:new Date().toISOString()};
}
async function deleteFromStorage(path){
  if(!supaClient || !path) return;
  try{ await supaClient.storage.from('safety-files').remove([path]); }
  catch(e){ console.warn('Storage 삭제 실패:', path, e); }
}

// ============================================================
// 지적사항 CRUD
// ============================================================
const SITE_LABEL = {suwon:'수원', hwaseong:'화성'};
let currentFilter = 'all';

function getSiteIssues(){ return DB.get('siteIssues'); }
async function saveSiteIssues(list){ await DB.set('siteIssues', list); }

async function addSiteIssue(){
  const desc = document.getElementById('iss-desc').value.trim();
  if(!desc){ alert('지적사항 내용을 입력해주세요.'); document.getElementById('iss-desc').focus(); return; }
  const issues = getSiteIssues();
  const today = new Date().toISOString().split('T')[0];
  issues.push({
    id: Date.now(),
    date: today,
    site: document.getElementById('iss-site').value,
    desc,
    location: document.getElementById('iss-location').value.trim(),
    status: 'open',
    resolvedDate: '',
    memo: '',
    files: []
  });
  await saveSiteIssues(issues);
  document.getElementById('iss-desc').value = '';
  document.getElementById('iss-location').value = '';
  setupFilledWatch();
  document.getElementById('iss-desc').focus();
  renderSiteIssues();
}

async function toggleIssueStatus(id){
  const issues = getSiteIssues();
  const issue = issues.find(i=>i.id===id);
  if(!issue) return;
  if(issue.status==='open'){
    issue.status='done';
    issue.resolvedDate = new Date().toISOString().split('T')[0];
  } else {
    issue.status='open';
    issue.resolvedDate='';
  }
  await saveSiteIssues(issues);
  renderSiteIssues();
}

async function deleteSiteIssue(id){
  if(!confirm('이 지적사항을 삭제할까요? 첨부파일도 함께 삭제됩니다.')) return;
  const issues = getSiteIssues();
  const issue = issues.find(i=>i.id===id);
  if(issue && Array.isArray(issue.files)){
    for(const f of issue.files){ if(f.path) await deleteFromStorage(f.path); }
  }
  await saveSiteIssues(issues.filter(i=>i.id!==id));
  renderSiteIssues();
}

async function updateIssueMemo(id, value){
  const issues = getSiteIssues();
  const issue = issues.find(i=>i.id===id);
  if(!issue) return;
  issue.memo = value;
  await saveSiteIssues(issues);
}

function setFilter(f, btn){
  currentFilter = f;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  renderSiteIssues();
}

// ============================================================
// 렌더
// ============================================================
function renderSiteIssues(){
  const issues = getSiteIssues();
  const openCount = issues.filter(i=>i.status==='open').length;
  const doneCount = issues.filter(i=>i.status==='done').length;
  document.getElementById('stat-open').textContent = `미완료 ${openCount}건`;
  document.getElementById('stat-done').textContent = `완료 ${doneCount}건`;

  // 필터
  let filtered = issues.slice();
  if(currentFilter === 'open') filtered = filtered.filter(i => i.status === 'open');
  else if(currentFilter === 'done') filtered = filtered.filter(i => i.status === 'done');
  else if(currentFilter === 'suwon') filtered = filtered.filter(i => i.site === 'suwon');
  else if(currentFilter === 'hwaseong') filtered = filtered.filter(i => i.site === 'hwaseong');

  filtered.sort((a,b)=>{
    if(a.status !== b.status) return a.status === 'open' ? -1 : 1;
    return new Date(b.date) - new Date(a.date);
  });

  document.getElementById('list-count').textContent = `전체 ${issues.length}건 · 미완료 ${openCount} · 완료 ${doneCount}`;

  const box = document.getElementById('issue-list');
  if(filtered.length === 0){
    box.innerHTML = `<div class="empty-state">${issues.length === 0 ? '아직 등록된 지적사항이 없어요.' : '현재 필터에 해당하는 지적사항이 없어요.'}</div>`;
    return;
  }

  box.innerHTML = filtered.map((issue, idx) => {
    const isDone = issue.status === 'done';
    const fileCount = (Array.isArray(issue.files) ? issue.files.length : 0) + (issue.photo ? 1 : 0);
    const itemNo = issues.length - issues.indexOf(issue);
    return `<div class="issue-item ${isDone?'done':''}">
      <div class="ii-head">
        <span class="ii-no">No. ${itemNo}</span>
        <span class="ii-site">${SITE_LABEL[issue.site]||issue.site}</span>
        <span class="ii-date">${issue.date}</span>
        <button type="button" class="ii-del no-print" title="지적사항 삭제" onclick="deleteSiteIssue(${issue.id})">×</button>
      </div>
      <div class="ii-desc">${escapeHtml(issue.desc)}</div>
      ${issue.location?`<div class="ii-loc"><span class="k">위치</span>${escapeHtml(issue.location)}</div>`:''}
      <label class="ii-check">
        <input type="checkbox" ${isDone?'checked':''} onchange="toggleIssueStatus(${issue.id})">
        <span class="cl">개선 완료</span>
        <span class="cr">${isDone?`<strong>${issue.resolvedDate||''}</strong> 완료`:'미완료'}</span>
      </label>
      <div class="ii-memo-wrap">
        <div class="ml">개선 내역 / 비고</div>
        <textarea class="ii-memo" placeholder="조치 내용을 기재해주세요." onchange="updateIssueMemo(${issue.id},this.value)">${escapeHtml(issue.memo||'')}</textarea>
      </div>
      <div class="ii-footer">
        <button type="button" class="attach-btn ${fileCount?'':'empty'}" onclick="openFilesModal(${issue.id})">
          첨부 <span class="attach-cnt">${fileCount}</span>
        </button>
      </div>
    </div>`;
  }).join('');
}

// ============================================================
// 첨부파일 모달
// ============================================================
function openFilesModal(issueId){
  const modal = document.getElementById('files-modal');
  modal.dataset.issueId = String(issueId);
  const issues = getSiteIssues();
  const issue = issues.find(i=>i.id===issueId);
  document.getElementById('files-modal-title-text').textContent = `첨부파일 — ${(issue?.desc||'').slice(0,40)}`;
  renderIssueFiles(issueId);
  modal.classList.add('show');
  document.body.style.overflow = 'hidden';
}
function closeFilesModal(){
  const m = document.getElementById('files-modal');
  m.classList.remove('show');
  m.dataset.issueId = '';
  document.body.style.overflow = '';
}

function renderIssueFiles(issueId){
  const issues = getSiteIssues();
  const issue = issues.find(i=>i.id===issueId);
  if(!issue) return;
  const listEl = document.getElementById('files-modal-list');
  const files = Array.isArray(issue.files) ? issue.files : [];
  const legacyPhoto = issue.photo ? [{name:'기존 사진', url:issue.photo, mime:'image/jpeg', _legacy:true}] : [];
  const all = [...files, ...legacyPhoto];
  if(all.length === 0){
    listEl.innerHTML = '<div class="file-empty">첨부파일 없음 — 아래에서 사진 촬영 또는 파일 선택</div>';
    return;
  }
  listEl.innerHTML = all.map((f, i) => {
    const icon = getFileIcon(f.mime || '', f.name);
    const sizeStr = f.size ? `${(f.size/1024).toFixed(1)}KB` : '';
    const isImage = (f.mime||'').startsWith('image/');
    const viewBtn = isImage
      ? `<button class="view-btn" onclick="openPhotoLightbox('${f.url}')">보기</button>`
      : `<a class="view-btn" href="${f.url}" target="_blank" rel="noopener">열기</a>`;
    const delBtn = f._legacy
      ? `<button class="del-btn" onclick="removeLegacyPhoto(${issueId})">삭제</button>`
      : `<button class="del-btn" onclick="removeIssueFile(${issueId},${i})">삭제</button>`;
    return `<div class="file-item">
      <div class="fi-icon">${icon}</div>
      <div class="fi-info">
        <div class="fi-name">${escapeHtml(f.name||'파일')}</div>
        <div class="fi-meta">${sizeStr}${f._legacy?' · 레거시':''}</div>
      </div>
      <div class="fi-actions">${viewBtn}${delBtn}</div>
    </div>`;
  }).join('');
}

function getFileIcon(mime, name){
  const n = (name||'').toLowerCase();
  if((mime||'').startsWith('image/')) return 'IMG';
  if(mime === 'application/pdf' || n.endsWith('.pdf')) return 'PDF';
  if(n.endsWith('.xlsx') || n.endsWith('.xls') || (mime||'').includes('spreadsheet')) return 'XLS';
  if(n.endsWith('.docx') || n.endsWith('.doc') || (mime||'').includes('word')) return 'DOC';
  if(n.endsWith('.pptx') || n.endsWith('.ppt') || (mime||'').includes('presentation')) return 'PPT';
  if(n.endsWith('.zip') || n.endsWith('.7z') || n.endsWith('.rar')) return 'ZIP';
  return 'FILE';
}

async function addIssueFiles(input){
  if(!supaClient){ alert('실시간 공유 미연결. 관리자에게 문의해주세요.'); input.value=''; return; }
  if(!input.files.length) return;
  const modal = document.getElementById('files-modal');
  const issueId = parseInt(modal.dataset.issueId, 10);
  if(!issueId){ alert('지적사항을 먼저 선택하세요.'); return; }

  const issues = getSiteIssues();
  const issue = issues.find(i=>i.id===issueId);
  if(!issue) return;
  if(!Array.isArray(issue.files)) issue.files = [];

  const listEl = document.getElementById('files-modal-list');
  const files = Array.from(input.files);
  for(let i=0;i<files.length;i++){
    const file = files[i];
    const ph = document.createElement('div');
    ph.style.cssText = 'padding:10px 12px;border:1px dashed #0d1f3c;border-radius:4px;margin-bottom:7px;font-size:12px;color:#0d1f3c;';
    ph.textContent = `업로드 중… ${file.name} (${i+1}/${files.length})`;
    listEl.appendChild(ph);
    try{
      const meta = await uploadToStorage(file, `issues/${issueId}`);
      issue.files.push(meta);
      ph.remove();
    }catch(err){
      ph.style.color = '#991b1b';
      ph.style.borderColor = '#991b1b';
      ph.textContent = `업로드 실패: ${file.name} — ${err.message||err}`;
      console.error(err);
    }
  }
  await saveSiteIssues(issues);
  renderIssueFiles(issueId);
  renderSiteIssues();
  input.value = '';
}

async function removeIssueFile(issueId, fileIdx){
  if(!confirm('이 파일을 삭제할까요?')) return;
  const issues = getSiteIssues();
  const issue = issues.find(i=>i.id===issueId);
  if(!issue || !Array.isArray(issue.files)) return;
  const file = issue.files[fileIdx];
  if(file && file.path) await deleteFromStorage(file.path);
  issue.files.splice(fileIdx, 1);
  await saveSiteIssues(issues);
  renderIssueFiles(issueId);
  renderSiteIssues();
}

async function removeLegacyPhoto(issueId){
  if(!confirm('기존 사진을 삭제할까요?')) return;
  const issues = getSiteIssues();
  const issue = issues.find(i=>i.id===issueId);
  if(!issue) return;
  issue.photo = '';
  await saveSiteIssues(issues);
  renderIssueFiles(issueId);
  renderSiteIssues();
}

// ============================================================
// Lightbox
// ============================================================
function openPhotoLightbox(src){
  document.getElementById('lightbox-img').src = src;
  document.getElementById('photo-lightbox').classList.add('show');
  document.body.style.overflow = 'hidden';
}
function closePhotoLightbox(){
  document.getElementById('photo-lightbox').classList.remove('show');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => {
  if(e.key === 'Escape'){ closePhotoLightbox(); closeFilesModal(); }
});

// ============================================================
// 입력 폼 라벨 filled 워처
// ============================================================
function setupFilledWatch(){
  document.querySelectorAll('label.field').forEach(label => {
    const ctrl = label.querySelector('input, select, textarea');
    if(!ctrl) return;
    const upd = () => label.classList.toggle('filled', (ctrl.value||'').trim() !== '');
    ctrl.addEventListener('input', upd);
    ctrl.addEventListener('change', upd);
    upd();
  });
}

// ============================================================
// Utils
// ============================================================
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// ============================================================
// INIT
// ============================================================
window.addEventListener('DOMContentLoaded', () => {
  // 즉시 렌더
  renderSiteIssues();
  setupFilledWatch();
  // 백그라운드 Supabase
  initSupabase(DEFAULT_SUPABASE_URL, DEFAULT_SUPABASE_KEY);
  loadFromSupabase().then(() => renderSiteIssues());
  window.addEventListener('storage', e => {
    if(e.key === 'safety_siteIssues') renderSiteIssues();
  });
});
</script>
