<html lang="ko">
<head>
  <meta charset="UTF-8"/>

  <title>신성오토텍 일간 업무보고</title>
  <style>
    :root {
      --primary: #1a2e4a; --accent: #2563eb;
      --green:#16a34a; --green-bg:#f0fdf4; --green-bd:#bbf7d0;
      --yellow:#d97706; --yellow-bg:#fffbeb; --yellow-bd:#fde68a;
      --red:#dc2626; --red-bg:#fef2f2; --red-bd:#fecaca;
      --blue-bg:#eff6ff; --blue-bd:#bfdbfe;
      --gray:#64748b; --bg:#f1f5f9; --card:#fff; --border:#e2e8f0; --text:#0f172a;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:var(--bg);color:var(--text);font-size:13px;}

    /* ── Header ── */
    header{background:var(--primary);color:#fff;padding:18px 24px 0;}
    .hd-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
    header h1{font-size:17px;font-weight:700;}
    header .sub{font-size:11px;color:rgba(255,255,255,.5);margin-top:2px;}
    .date-tabs{display:flex;gap:4px;overflow-x:auto;}
    .dtab{padding:7px 16px;border-radius:8px 8px 0 0;border:none;cursor:pointer;
      font-size:12px;font-weight:600;white-space:nowrap;color:rgba(255,255,255,.55);
      background:rgba(255,255,255,.08);transition:.15s;}
    .dtab.active{background:var(--bg);color:var(--primary);}
    .dtab:hover:not(.active){background:rgba(255,255,255,.16);color:#fff;}

    /* ── Layout ── */
    main{max-width:1280px;margin:0 auto;padding:20px 16px 60px;}
    .day-panel{display:none;}
    .day-panel.active{display:block;}

    /* ── Summary Bar ── */
    .summary{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
    .sm-card{background:var(--card);border:1px solid var(--border);border-radius:8px;
      padding:10px 16px;display:flex;align-items:center;gap:10px;}
    .sm-num{font-size:22px;font-weight:800;line-height:1;}
    .sm-lbl{font-size:11px;color:var(--gray);}
    .sm-card.red .sm-num{color:var(--red);}
    .sm-card.yellow .sm-num{color:var(--yellow);}
    .sm-card.green .sm-num{color:var(--green);}
    .sm-card.blue .sm-num{color:var(--accent);}

    /* ── Team Grid ── */
    .team-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
    @media(max-width:1000px){.team-grid{grid-template-columns:repeat(2,1fr);}}
    @media(max-width:600px){.team-grid{grid-template-columns:1fr;}}

    /* ── Team Card ── */
    .tc{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
    .tc-head{
      padding:12px 14px;display:flex;align-items:center;justify-content:space-between;
      border-bottom:1px solid var(--border);
    }
    .tc-left{display:flex;align-items:center;gap:7px;}
    .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
    .dot.green{background:var(--green);}
    .dot.yellow{background:var(--yellow);}
    .dot.red{background:var(--red);}
    .dot.gray{background:#94a3b8;}
    .tc-name{font-size:13px;font-weight:700;}
    .hc{font-size:11px;color:var(--gray);background:#f1f5f9;padding:2px 7px;border-radius:20px;margin-left:4px;}
    .ibadge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;
      background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd);}
    .ibadge.ok{background:var(--green-bg);color:var(--green);border-color:var(--green-bd);}

    /* ── KPI Strip ── */
    .kpi-strip{display:grid;grid-template-columns:repeat(2,1fr);gap:1px;background:var(--border);}
    .kpi-cell{background:var(--card);padding:8px 12px;text-align:center;}
    .kv{font-size:15px;font-weight:800;line-height:1;margin-bottom:2px;}
    .kv.red{color:var(--red);}
    .kv.yellow{color:var(--yellow);}
    .kv.green{color:var(--green);}
    .kv.normal{color:var(--text);}
    .kl{font-size:10px;color:var(--gray);}

    /* ── Expand ── */
    .xbtn{width:100%;padding:7px;border:none;background:none;color:var(--accent);
      font-size:11px;font-weight:600;cursor:pointer;border-top:1px solid var(--border);}
    .xbtn:hover{background:var(--blue-bg);}
    .tc-detail{display:none;border-top:1px solid var(--border);background:#fafbfc;}
    .tc-detail.open{display:block;}

    /* ── Section ── */
    .dsec{padding:10px 14px 4px;}
    .dsec-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;
      color:var(--gray);margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--border);}

    /* ── Work Item Table ── */
    .wit{width:100%;border-collapse:collapse;margin-bottom:8px;}
    .wit td{padding:5px 8px;vertical-align:top;border-bottom:1px solid #f1f5f9;font-size:12px;}
    .wit tr:last-child td{border-bottom:none;}
    .wit tr:hover td{background:#f8fafc;}

    /* Customer / Model tags */
    .tag{display:inline-block;border-radius:4px;padding:1px 6px;font-size:10px;font-weight:700;white-space:nowrap;}
    .tag.cust{background:#e0f2fe;color:#0369a1;}   /* 고객사 — 파랑 */
    .tag.model{background:#f3e8ff;color:#7e22ce;}  /* 모델 — 보라 */
    .tag.team{background:#dcfce7;color:#15803d;}   /* 관련팀 — 초록 */

    /* Status pill */
    .st{display:inline-block;border-radius:20px;padding:1px 8px;font-size:10px;font-weight:700;white-space:nowrap;}
    .st.done{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd);}
    .st.wip {background:var(--blue-bg);color:var(--accent);border:1px solid var(--blue-bd);}
    .st.issue{background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd);}
    .st.plan{background:#f8fafc;color:var(--gray);border:1px solid var(--border);}
    .st.warn{background:var(--yellow-bg);color:var(--yellow);border:1px solid var(--yellow-bd);}

    /* Mini KPI table */
    .mkt{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:8px;}
    .mkt th{background:var(--primary);color:#fff;padding:4px 7px;text-align:center;font-size:10.5px;}
    .mkt td{padding:4px 7px;text-align:center;border-bottom:1px solid var(--border);}
    .mkt tr:last-child td{font-weight:700;background:var(--blue-bg);}
    .mkt td:first-child{text-align:left;}
    .rc{color:var(--red);font-weight:700;}
    .gc{color:var(--green);font-weight:700;}
  </style>
</head>

// ── 렌더 엔진 ──

const DAYS = ['일','월','화','수','목','금','토'];
const ST_LABEL = {done:'완료', wip:'진행중', issue:'이슈', plan:'예정', warn:'주의'};

function stPill(s){ return `<span class="st ${s}">${ST_LABEL[s]||s}</span>`; }
function tag(cls,txt){ return txt&&txt!=='-'?`<span class="tag ${cls}">${txt}</span>`:''; }

function buildSummary(data){
  const ts=Object.values(data);
  const r=ts.filter(t=>t.status==='red').length;
  const y=ts.filter(t=>t.status==='yellow').length;
  const g=ts.filter(t=>t.status==='green').length;
  const iss=ts.reduce((s,t)=>s+(t.sections||[]).reduce((a,sec)=>a+sec.items.filter(i=>i.status==='issue').length,0),0);
  return `<div class="summary">
    <div class="sm-card red"><div class="sm-num">${r}</div><div class="sm-lbl">위험 팀</div></div>
    <div class="sm-card yellow"><div class="sm-num">${y}</div><div class="sm-lbl">주의 팀</div></div>
    <div class="sm-card green"><div class="sm-num">${g}</div><div class="sm-lbl">정상 팀</div></div>
    <div class="sm-card ${iss>0?'red':'green'}"><div class="sm-num">${iss}</div><div class="sm-lbl">이슈 항목</div></div>
  </div>`;
}

function buildCard(name, t, dkey){
  const uid = (dkey+'-'+name).replace(/[\s()]/g,'_');
  const issueCnt = (t.sections||[]).reduce((a,s)=>a+s.items.filter(i=>i.status==='issue').length,0);
  const badge = issueCnt>0
    ? `<span class="ibadge">${issueCnt}건 이슈</span>`
    : `<span class="ibadge ok">이상없음</span>`;
  const hcHtml = t.headcount?`<span class="hc">${t.headcount}</span>`:'';

  // KPI strip
  const kpiHtml = (t.kpi||[]).map(k=>`
    <div class="kpi-cell">
      <div class="kv ${k.color}">${k.val}</div>
      <div class="kl">${k.label}</div>
    </div>`).join('');

  // Sections
  let secHtml = '';
  for(const sec of (t.sections||[])){
    const rows = sec.items.map(item=>`
      <tr>
        <td style="width:80px">${tag('cust',item.cust)}</td>
        <td style="width:120px">${tag('model',item.model)}</td>
        <td>${item.action}</td>
        <td style="width:60px;text-align:center">${stPill(item.status)}</td>
      </tr>`).join('');
    secHtml += `<div class="dsec">
      <div class="dsec-title">${sec.title}</div>
      <table class="wit"><tbody>${rows}</tbody></table>
    </div>`;
  }

  // KPI Table
  let kpiTableHtml = '';
  if(t.kpiTable){
    const ths = t.kpiTable.headers.map(h=>`<th>${h}</th>`).join('');
    const trs = t.kpiTable.rows.map(row=>{
      const tds = row.map((c,i)=>{
        let cls='';
        if(typeof c==='string'&&c.endsWith('%')){
          const n=parseFloat(c);
          if(!isNaN(n)) cls = n>=100?'gc':n<70?'rc':'';
        }
        return `<td class="${cls}">${c}</td>`;
      }).join('');
      return `<tr>${tds}</tr>`;
    }).join('');
    kpiTableHtml=`<div class="dsec">
      <div class="dsec-title">실적 데이터</div>
      <div style="overflow-x:auto">
        <table class="mkt"><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table>
      </div>
    </div>`;
  }

  return `<div class="tc">
    <div class="tc-head">
      <div class="tc-left">
        <div class="dot ${t.status}"></div>
        <span class="tc-name">${name}</span>${hcHtml}
      </div>
      ${badge}
    </div>
    <div class="kpi-strip">${kpiHtml}</div>
    <button class="xbtn" onclick="toggleDetail('${uid}',this)">▼ 상세 보기</button>
    <div class="tc-detail" id="${uid}">${secHtml}${kpiTableHtml}</div>
  </div>`;
}

function buildDay(dkey, data){
  const cards = Object.entries(data).map(([n,t])=>buildCard(n,t,dkey)).join('');
  return `<div class="day-panel" id="panel-${dkey}">
    ${buildSummary(data)}
    <div class="team-grid">${cards}</div>
  </div>`;
}

function toggleDetail(id,btn){
  const el=document.getElementById(id);
  el.classList.toggle('open');
  btn.textContent=el.classList.contains('open')?'▲ 닫기':'▼ 상세 보기';
}

function switchDate(dkey){
  document.querySelectorAll('.day-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.dtab').forEach(t=>t.classList.remove('active'));
  document.getElementById('panel-'+dkey)?.classList.add('active');
  const dates=Object.keys(REPORTS).sort((a,b)=>b.localeCompare(a));
  document.querySelectorAll('.dtab')[dates.indexOf(dkey)]?.classList.add('active');
}

function init(){
  const dates=Object.keys(REPORTS).sort((a,b)=>b.localeCompare(a));
  const tabsEl=document.getElementById('dateTabs');
  const mainEl=document.getElementById('mainContent');
  dates.forEach((d,i)=>{
    const dt=new Date(d);
    const btn=document.createElement('button');
    btn.className='dtab'+(i===0?' active':'');
    btn.textContent=`${dt.getMonth()+1}/${dt.getDate()}(${DAYS[dt.getDay()]})`;
    btn.onclick=()=>switchDate(d);
    tabsEl.appendChild(btn);
    mainEl.innerHTML+=buildDay(d,REPORTS[d]);
  });
  if(dates.length) switchDate(dates[0]);
}
init();
</script>
