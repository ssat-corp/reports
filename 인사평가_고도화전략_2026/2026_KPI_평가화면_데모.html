<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>2026 KPI 평가 화면 데모 · 사례 모음</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system,"Segoe UI","Malgun Gothic",sans-serif; margin:0; padding:0; line-height:1.55; }

  /* ─── 테마 공통 변수 (기본: 팀원 = 회색톤) ─── */
  :root {
    --bg: #f5f5f4;
    --surface: #ffffff;
    --border: #e5e5e4;
    --border-strong: #d4d4d3;
    --text: #1c1c1c;
    --text-dim: #6b6b6b;
    --text-faint: #9a9a9a;
    --accent: #4b5563;
    --accent-soft: #eeeeed;
    --accent-bg: #4b4b4a;
    --chip: #6b6b6a;
  }
  /* 팀장 테마 — 파란톤 */
  body[data-theme="leader"] {
    --bg: #f1f5f9;
    --border: #e2e8f0;
    --border-strong: #cbd5e1;
    --text: #0f172a;
    --text-dim: #475569;
    --text-faint: #94a3b8;
    --accent: #1e3a5f;
    --accent-soft: #dbe4f0;
    --accent-bg: #334155;
    --chip: #475569;
  }

  body { background:var(--bg); color:var(--text); }

  /* ─── 시나리오 바 ─── */
  .scenario-bar {
    position:sticky; top:0; z-index:50;
    background:#0f172a; color:#f1f5f9;
    padding:14px 24px;
    box-shadow:0 1px 4px rgba(0,0,0,0.15);
  }
  .scenario-bar .title { font-size:13px; font-weight:600; opacity:.85; margin-bottom:10px; letter-spacing:-0.1px; }
  .scenario-tabs { display:flex; gap:6px; flex-wrap:wrap; }
  .scenario-tabs button {
    background:#1e293b; color:#cbd5e1; border:1px solid #334155;
    padding:7px 14px; border-radius:5px; font-size:12.5px; font-weight:500;
    cursor:pointer; font-family:inherit;
  }
  .scenario-tabs button:hover { background:#334155; color:#fff; }
  .scenario-tabs button.active { background:#f1f5f9; color:#0f172a; border-color:#f1f5f9; font-weight:600; }
  .scenario-note { margin-top:8px; font-size:10.5px; color:#64748b; }

  .wrap { max-width:1040px; margin:0 auto; padding:24px; }
  .hero { background:var(--accent-bg); color:#f8fafc; padding:22px 26px; border-radius:8px; }
  .hero h1 { margin:0 0 4px; font-size:20px; font-weight:600; letter-spacing:-0.2px; }
  .hero .sub { opacity:.78; font-size:12.5px; }
  .role-chip { display:inline-block; background:var(--chip); color:#f8fafc; padding:3px 9px; border-radius:4px; font-size:11px; font-weight:500; margin-left:8px; }

  .section { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:22px 26px; margin:18px 0; }
  .section h2 { margin:0 0 4px; font-size:15px; color:var(--text); font-weight:600; }
  .section .lead { color:var(--text-dim); font-size:12.5px; margin-bottom:18px; }

  table { width:100%; border-collapse:collapse; font-size:13px; }
  th { text-align:left; background:#fafafa; color:var(--text-dim); padding:9px 12px; font-size:11.5px; font-weight:600; border-bottom:1px solid var(--border-strong); }
  td { padding:14px 12px; border-bottom:1px solid var(--border); vertical-align:top; }
  tr:last-child td { border-bottom:none; }

  .kpi-tag { display:inline-block; background:var(--accent-soft); color:var(--accent); padding:2px 8px; border-radius:4px; font-size:11px; font-weight:600; }
  .kpi-title { margin-top:6px; font-weight:600; color:var(--text); font-size:13px; }
  .max-hint { font-size:10.5px; color:var(--text-faint); margin-top:5px; }

  .metric-box { background:#fafafa; border:1px solid var(--border); border-radius:6px; padding:10px 12px; margin-top:10px; font-size:12px; }
  .metric-target { color:var(--text); font-weight:600; }
  .metric-dir { color:var(--text-faint); font-size:11px; margin-left:6px; }
  .metric-input-row { display:flex; gap:8px; align-items:center; margin-top:8px; }
  .metric-input-row label { color:var(--text-dim); font-size:11px; }
  .metric-input-row input[type=number] { width:86px; padding:4px 7px; border:1px solid var(--border-strong); border-radius:4px; font-size:12.5px; background:#fff; }
  .autoscore { font-weight:700; font-size:14px; color:var(--accent); margin-left:auto; }
  .autoscore-suffix { color:var(--text-faint); font-size:11px; }

  .radio-group label { display:block; margin-bottom:5px; cursor:pointer; font-size:12.5px; color:var(--text); }
  .radio-group input { margin-right:5px; }
  textarea { width:100%; padding:7px 9px; border:1px solid var(--border-strong); border-radius:5px; font-size:12px; font-family:inherit; resize:vertical; min-height:48px; background:#fff; }

  .sahun-badge { display:inline-block; padding:3px 8px; border-radius:4px; font-size:11px; font-weight:600; background:var(--accent-soft); color:var(--accent); border:1px solid var(--border-strong); white-space:nowrap; }
  .competency-label { display:inline-block; font-weight:600; color:var(--text); font-size:13px; margin-top:6px; }
  .q-list { margin:6px 0 0 16px; padding:0; font-size:12px; color:var(--text-dim); }

  .team-member-card .name { font-weight:700; font-size:14px; color:var(--text); }
  .team-member-card .tag { font-size:11px; background:#eef2f6; color:var(--text-dim); padding:3px 8px; border-radius:4px; }

  button.primary { background:var(--accent); color:#fff; border:0; border-radius:5px; padding:8px 18px; font-size:13px; font-weight:500; cursor:pointer; font-family:inherit; }

  button.confirm.done { background:#22543d; }
  .confirm-status { display:inline-block; margin-right:12px; font-size:12px; color:var(--text-dim); }

  .review-hint { background:#fafafa; color:var(--text-dim); padding:6px 10px; border-radius:4px; font-size:11px; margin-top:6px; border:1px dashed var(--border-strong); }
  .demo-note { text-align:center; font-size:11px; color:var(--text-faint); padding:16px 0 30px; }

  /* 시급직 축 카드 */

  .axis-info-table th { background:#f8fafc; padding:7px 10px; text-align:left; font-size:11px; font-weight:600; color:var(--text-dim); border-bottom:1px solid var(--border); }
  .axis-info-table td { padding:7px 10px; border-bottom:1px solid var(--border); color:var(--text-dim); }
  .hourly-member { border:1px solid var(--border); border-radius:6px; padding:16px 18px; margin-bottom:12px; background:#fcfcfd; }
  .hourly-name-row { display:flex; align-items:center; gap:10px; margin-bottom:12px; }
  .hourly-name { font-weight:700; font-size:14px; color:var(--text); }
  .hourly-tag { font-size:11px; background:#eef2f6; color:var(--text-dim); padding:3px 8px; border-radius:4px; }
  .axis-grid { display:grid; grid-template-columns:repeat(5, 1fr); gap:10px; }
  .axis-cell { background:#f8fafc; border:1px solid var(--border); border-radius:5px; padding:10px; text-align:center; }
  .axis-label { font-size:11px; color:var(--text-dim); margin-bottom:4px; font-weight:600; }
  .axis-sahun { font-size:10px; color:var(--accent); margin-bottom:6px; }
  .axis-input { width:60px; padding:6px; border:1px solid var(--border-strong); border-radius:4px; font-size:14px; text-align:center; }

  .hourly-total .score { font-size:18px; font-weight:700; color:var(--accent); }
  .hourly-memo { margin-top:10px; }
</style>

<script>

 * ─────────────────────────────────────────────────────
 * [P0-1 리밸런싱] 수정일: 2026-04-19
 * 점수 구조 (신규):
 *   정량 45점 = KPI 3개 × 15점

 *   본인 40% + 팀장 40% + 최상위자 20% (±10점 수동 조정 가능)
 * ─────────────────────────────────────────────────────
 * 조직개편 반영 (2026-04-19):
 *   이환돈: 조립팀장 → 영업팀장 (KPI·사훈 영업 맥락 재작성)
 *   양춘향: 조립팀 사원(hourly) 삭제 → 조립팀장대행(annual) 전환
 *   안성현: 영업구매실장 — 영업팀장+구매팀장 업무 총괄 (KPI 2개 영역)
 *   류항복: 퇴사 처리 (데이터 삭제)
 *   허향미: 퇴사 처리 (데이터 삭제)
 *   조경환: 개발팀 이사, evaluatorOnly:true 신규 등록
 * ─────────────────────────────────────────────────────
 * 공식 프레임:
 *   ① 더 높은 평가를 받은 직원에게 더 나은 처우를 제공하기 위한 절차
 *   ② 업무를 더 합리적으로 분배·재조정하기 위한 절차
 */

// ── 자동화·추가 항목 옵션 풀 ──────────────────────────────

const GOAL_COST = '원가';   // 원가절감
const GOAL_ORG  = '조직';   // 조직기능 향상
const GOAL_SUST = '지속';   // 지속가능 운영

// ── KPI 자동 점수 계산 ───────────────────────────────────
// 직원이 실적(actual) 하나만 입력하면 배점(weight) 기준으로 자동 환산.
// direction:
//   'higher' — 높을수록 좋음 (매출·건수·달성률)     → actual/target
//   'lower'  — 낮을수록 좋음 (지연·오류건·일수)     → target/actual
//   'zero'   — 0이 목표 (사고·오류 0건)              → 0=만점, 1=70%, 2=40%, 3+=0
//   'rate'   — 목표가 이미 % (달성률 자체)          → actual/100
// 100% 상한(초과달성 가산 없음). 5월 합의에서 target 값만 팀장이 시트에서 수정.
function calcKpiScore(metric, actual, weight) {
  if (metric == null || actual == null || actual === '') return null;
  const a = Number(actual);
  if (!isFinite(a)) return null;
  const t = Number(metric.value);
  let rate;
  switch (metric.direction) {
    case 'higher': rate = t > 0 ? a / t : (a >= 0 ? 1 : 0); break;
    case 'lower':  rate = a <= 0 ? 1 : (t > 0 ? t / a : 0); break;
    case 'zero':   rate = a <= 0 ? 1 : Math.max(0, 1 - a * 0.3); break;
    case 'rate':   rate = a / 100; break;
    default:       rate = t > 0 ? a / t : 0;
  }
  rate = Math.max(0, Math.min(1.0, rate));
  return Math.round(rate * Number(weight) * 10) / 10;
}

// ═══ 공용 유틸 ════════════════════════════════════════

};
function sahunOf(label) { return SAHUN_MAP[label] || '—'; }

const DIR_LABEL = {
  higher:'↑ 높을수록 좋음', lower:'↓ 낮을수록 좋음',
  zero:'= 0이 목표', rate:'% 달성률 자체', review:'5월 합의 시 확정 예정'
};
function fmtTarget(m) {
  if (m.direction === 'review') return '— 미정 (합의 필요) —';
  const v = (m.value === 0 && m.direction === 'zero') ? '0' : m.value;
  return `${v}${m.unit || ''}${m.period && m.period !== '-' ? ' / ' + m.period : ''}`;
}

function metricBlock(k, idPrefix, editable) {
  const m = k.metric || { direction:'review', value:0, unit:'-', period:'-' };
  const disabled = m.direction === 'review' ? 'disabled' : '';
  const unitSafe = m.unit || '';
  const dataM = JSON.stringify(m).replace(/'/g,'&#39;');
  const targetPart = editable
    ? `<label>목표 숫자</label>
       <input type="number" step="any" value="${m.direction==='review'?'':m.value}" ${disabled}
         onchange="updateMetric('${idPrefix}', this.value)" data-metric='${dataM}'
         style="width:80px;padding:4px 6px;border:1px solid var(--border-strong);border-radius:4px;font-size:12.5px;">
       <span style="color:var(--text-faint);font-size:11px;">${unitSafe}</span>
       <span style="color:var(--text-faint);font-size:10px;">${m.period && m.period!=='-' ? '/ '+m.period : ''}</span>`
    : `<span class="metric-target">목표: ${fmtTarget(m)}</span><span class="metric-dir">${DIR_LABEL[m.direction] || m.direction}</span>`;
  const reviewHint = m.direction === 'review'
    ? `<div class="review-hint">원문이 복합 지표 — 5월 합의 시 주지표로 축약</div>` : '';
  return `
    <div class="metric-box">
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">${targetPart}</div>
      ${reviewHint}
      <div class="metric-input-row">
        <label>현재 실적</label>
        <input type="number" step="any" ${disabled}
          id="${idPrefix}-actual" data-metric='${dataM}' data-max="${k.weight}"
          oninput="previewScore('${idPrefix}')" placeholder="숫자">
        <span style="color:var(--text-faint);font-size:11px;">${unitSafe}</span>
        <span class="autoscore" id="${idPrefix}-score">— 점</span>
        <span class="autoscore-suffix">/ ${k.weight}점</span>
      </div>
    </div>`;
}
function previewScore(idPrefix) {
  const input = document.getElementById(`${idPrefix}-actual`);
  const out = document.getElementById(`${idPrefix}-score`);
  if (!input || !out) return;
  const raw = input.value;
  if (raw === '') { out.textContent = '— 점'; return; }
  const actual = Number(raw);
  if (!isFinite(actual)) { out.textContent = '입력오류'; return; }
  const metric = JSON.parse(input.dataset.metric);
  const s = calcKpiScore(metric, actual, Number(input.dataset.max) || 15);
  if (s == null) { out.textContent = '— 점'; return; }
  out.textContent = s + '점';
}
function updateMetric(idPrefix, newValue) {
  const actualInput = document.getElementById(`${idPrefix}-actual`);
  if (!actualInput) return;
  const m = JSON.parse(actualInput.dataset.metric);
  m.value = Number(newValue);
  actualInput.dataset.metric = JSON.stringify(m);
  previewScore(idPrefix);
}
function confirmSahun() {
  const btn = document.getElementById('sahun-confirm-btn');
  const st = document.getElementById('sahun-status');
  if (!btn) return;
  btn.textContent = '확정 완료';
  btn.classList.add('done');
  btn.disabled = true;
  if (st) { st.textContent = '✓ 3개 역량 확정됨'; st.style.color = '#22543d'; }
}

// ═══ 시급직 유틸 ════════════════════════════════════
function updateHourlyTotal(memberId) {
  const inputs = document.querySelectorAll(`input[data-member="${memberId}"]`);
  let total = 0;
  inputs.forEach(i => {
    const v = Number(i.value);
    if (isFinite(v)) total += Math.max(0, Math.min(Number(i.max) || 20, v));
  });
  const totalEl = document.getElementById(`hourly-total-${memberId}`);
  if (totalEl) totalEl.textContent = total + '점';
}
function renderHourlyMember(emp, axes) {
  const memberId = emp.name.replace(/\s/g,'');
  const cells = axes.map(a => `
    <div class="axis-cell">
      <div class="axis-label">${a.label}</div>
      <div class="axis-sahun">${sahunOf(a.sahunRef) || '—'}</div>
      <input type="number" class="axis-input" min="0" max="${a.weight}"
        data-member="${memberId}"
        oninput="updateHourlyTotal('${memberId}')" placeholder="0-${a.weight}">
      <div class="axis-max">/ ${a.weight}점</div>
    </div>`).join('');
  return `
    <div class="hourly-member">
      <div class="hourly-name-row">
        <span class="hourly-name">${emp.name}</span>
        <span class="hourly-tag">${emp.rank} · 시급직</span>
      </div>

        <span class="label">팀장 평가 총점 (가중치 20% 반영 전)</span>

}

function showCase(name) {
  document.querySelectorAll('[data-case]').forEach(b => b.classList.toggle('active', b.dataset.case === name));
  window.scrollTo(0, 0);
  if (name === '이성호') render이성호();
  else if (name === '박제성') render박제성();
  else if (name === '양춘향') render양춘향();
}
document.querySelectorAll('[data-case]').forEach(b => b.onclick = () => {
  showCase(b.dataset.case);
  history.replaceState(null, '', '#' + encodeURIComponent(b.dataset.case));
});
const initial = decodeURIComponent((location.hash || '#이성호').slice(1));
showCase(['이성호','박제성','양춘향'].includes(initial) ? initial : '이성호');
