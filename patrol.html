  get(key){ try{return JSON.parse(localStorage.getItem('safety_'+key))||[];}catch{return [];} },
  getObj(key){ try{return JSON.parse(localStorage.getItem('safety_'+key))||{};}catch{return {};} },
  async set(key, val){
    localStorage.setItem('safety_'+key, JSON.stringify(val));
    if(!supaClient) return;
    try{
      await supaClient.from('safety_store').upsert({key, value:val}, {onConflict:'key'});

async function loadFromSupabase(){
  if(!supaClient) return;
  try{
    const {data, error} = await supaClient.from('safety_store').select('*');
    if(error) throw error;
    if(data){
      data.forEach(row => localStorage.setItem('safety_'+row.key, JSON.stringify(row.value)));
    }
  }catch(e){ console.error('supaLoad 오류:', e); }
}

function initSupabase(url, key){
  try{
    supaClient = supabase.createClient(url, key);
    document.getElementById('conn-dot').className = 'conn-dot connected';
    document.getElementById('conn-text').textContent = '실시간 공유 연결됨';
    document.getElementById('warn-no-supa').classList.remove('show');
    supaClient.channel('patrol_sync')
      .on('postgres_changes', {event:'*', schema:'public', table:'safety_store'}, async () => {
        await loadFromSupabase();
        renderPatrolCalendar(); renderHistories();
        const form = document.getElementById('patrol-checklist-form');
        if(form.style.display === 'block' && form.dataset.key){
          const day = parseInt(form.dataset.key.split('-').pop(), 10);
          openPatrolDay(day);
        }
      })
      .subscribe();
    return true;
  }catch(e){
    console.error('Supabase 연결 실패:', e);
    document.getElementById('conn-dot').className = 'conn-dot error';
    document.getElementById('conn-text').textContent = '연결 실패';
    return false;
  }
}

// Supabase Storage에 사진 업로드 → 공개 URL 반환
async function uploadToStorage(file, subfolder){
  if(!supaClient) throw new Error('Supabase 미연결');
  const ts = Date.now();
  const safeName = file.name.replace(/[^a-zA-Z0-9가-힣._-]/g, '_');
  const path = `${subfolder}/${ts}_${safeName}`;
  const {error} = await supaClient.storage.from('safety-files').upload(path, file, {
    contentType: file.type,
    upsert: false
  });
  if(error) throw error;
  const {data:urlData} = supaClient.storage.from('safety-files').getPublicUrl(path);
  return {
    name: file.name,
    url: urlData.publicUrl,
    path: path,
    mime: file.type,
    size: file.size,
    uploadedAt: new Date().toISOString()
  };
}

async function deleteFromStorage(path){
  if(!supaClient || !path) return;
  try{
    await supaClient.storage.from('safety-files').remove([path]);
  }catch(e){ console.warn('Storage 삭제 실패:', path, e); }
}

function setPatrolFilter(val, btn){
  patrolSiteFilter = val;
  document.querySelectorAll('.pf-site').forEach(b=>{
    b.classList.add('btn-outline');
    b.style.background='#fff'; b.style.color='#1e5096';
  });
  if(btn){ btn.style.background='#1e5096'; btn.style.color='#fff'; btn.classList.remove('btn-outline'); }
  const form = document.getElementById('patrol-checklist-form');
  if(form.style.display === 'block' && form.dataset.key){
    const day = parseInt(form.dataset.key.split('-').pop(), 10);
    openPatrolDay(day);
  }
}
function getFilteredZones(){
  return patrolZones.filter(z => z.site==='all' || z.site===patrolSiteFilter);
}

// ============================================================
function renderPatrolCalendar(){
  const el = document.getElementById('patrol-calendar');
  if(!el) return;
  const now = new Date();
  const year = now.getFullYear(), month = now.getMonth(), todayDate = now.getDate();
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const dayNames = ['일','월','화','수','목','금','토'];
  const patrolData = DB.getObj('patrolCalendar');
  const monthKey = `${year}-${String(month+1).padStart(2,'0')}`;

  let doneCount = 0;
  for(let d=1; d<=daysInMonth; d++){
    const key = `${monthKey}-${String(d).padStart(2,'0')}`;
    if(patrolData[key] && patrolData[key].done) doneCount++;
  }

  let html = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
    <span style="font-size:14px;font-weight:700;color:#0d1f3c;">${year}년 ${month+1}월 패트롤</span>
    <span style="font-size:12px;color:#6b7280;">실시: <strong style="color:#1e5096;">${doneCount}</strong>회</span>
  </div>`;
  html += '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;text-align:center;font-size:12px;">';
  dayNames.forEach((d,i)=> html += `<div style="font-weight:700;color:${i===0?'#dc2626':'#6b7280'};padding:4px 0;">${d}</div>`);
  for(let i=0; i<firstDay; i++) html += '<div></div>';
  for(let d=1; d<=daysInMonth; d++){
    const dow = (firstDay + d - 1) % 7;
    const key = `${monthKey}-${String(d).padStart(2,'0')}`;
    const dayData = patrolData[key];
    const isDone = dayData && dayData.done;
    const isToday = d === todayDate;
    const bg = isDone ? '#dcfce7' : isToday ? '#eef4ff' : '#fff';
    const border = isToday ? '2px solid #1e5096' : '1px solid #e8edf3';
    const icon = isDone ? '✅' : '';
    html += `<div onclick="openPatrolDay(${d})" style="padding:6px 2px;border-radius:8px;background:${bg};border:${border};cursor:pointer;min-height:44px;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform=''">
      <div style="font-size:12px;font-weight:${isToday?'800':'500'};color:${dow===0?'#dc2626':'#374151'};">${d}</div>
      <div style="font-size:13px;margin-top:1px;">${icon}</div>
    </div>`;
  }
  html += '</div>';
  el.innerHTML = html;
}

function openPatrolDay(day){
  const now = new Date();
  const monthKey = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const key = `${monthKey}-${String(day).padStart(2,'0')}`;
  const dayNames = ['일','월','화','수','목','금','토'];
  const dateObj = new Date(now.getFullYear(), now.getMonth(), day);
  const dayName = dayNames[dateObj.getDay()];

  document.getElementById('patrol-form-title').textContent = '현장 패트롤 점검표';
  document.getElementById('patrol-form-date').textContent = `${key} (${dayName})`;
  document.getElementById('patrol-checklist-form').style.display = 'block';
  document.getElementById('patrol-checklist-form').dataset.key = key;

  const filtered = getFilteredZones();
  const patrolData = DB.getObj('patrolCalendar');
  const saved = patrolData[key] || {};
  const tbody = document.getElementById('patrol-check-tbody');
  let rows = '';
  filtered.forEach(zone=>{
    const icon = zone.name.match(/^(\S+)/)?.[1]||'';
    const label = zone.name.replace(/^(\S+)\s*/,'');
    rows += `<tr style="background:#f1f5f9;"><td colspan="4" style="padding:8px 12px;font-weight:800;font-size:13px;color:#0d1f3c;">${icon} ${label}</td></tr>`;
    zone.items.forEach((item,i)=>{
      const itemKey = `${zone.id}_${i}`;
      const checked = saved[itemKey] ? 'checked' : '';
      const memo = saved[`${itemKey}_memo`] || '';
      rows += `<tr>
        <td style="padding:6px 12px;font-size:12px;color:#374151;border-bottom:1px solid #f5f7fa;" colspan="2">${item}</td>
        <td style="text-align:center;border-bottom:1px solid #f5f7fa;"><input type="checkbox" ${checked} data-key="${itemKey}" style="width:18px;height:18px;accent-color:#1e5096;"></td>
        <td style="border-bottom:1px solid #f5f7fa;"><input type="text" value="${memo.replace(/"/g,'&quot;')}" data-memo="${itemKey}" placeholder="" style="width:100%;border:none;font-size:11px;padding:4px;color:#6b7280;"></td>
      </tr>`;
    });
  });
  tbody.innerHTML = rows;

  document.getElementById('p-issues').value = saved.issues || '';
  if(saved.inspector) document.getElementById('p-inspector').value = saved.inspector;
  if(saved.weather) document.getElementById('p-weather').value = saved.weather;

  renderPatrolPhotosPreview(key);
  document.getElementById('patrol-checklist-form').scrollIntoView({behavior:'smooth', block:'start'});
}

async function savePatrolDay(){
  const form = document.getElementById('patrol-checklist-form');
  const key = form.dataset.key;
  if(!key){ alert('날짜가 선택되지 않았습니다.'); return; }
  const patrolData = DB.getObj('patrolCalendar');
  const dayData = patrolData[key] || {};
  let totalChecked = 0, totalItems = 0;
  document.querySelectorAll('#patrol-check-tbody input[type=checkbox]').forEach(cb=>{
    dayData[cb.dataset.key] = cb.checked;
    totalItems++;
    if(cb.checked) totalChecked++;
  });
  document.querySelectorAll('#patrol-check-tbody input[data-memo]').forEach(inp=>{
    if(inp.value) dayData[inp.dataset.memo+'_memo'] = inp.value;
    else delete dayData[inp.dataset.memo+'_memo'];
  });
  dayData.done = totalChecked > 0;
  dayData.totalChecked = totalChecked;
  dayData.totalItems = totalItems;
  dayData.issues = document.getElementById('p-issues').value || '';
  dayData.inspector = document.getElementById('p-inspector').value || '';
  dayData.weather = document.getElementById('p-weather').value || '';
  dayData.siteFilter = patrolSiteFilter;
  dayData.savedAt = new Date().toISOString();
  patrolData[key] = dayData;
  await DB.set('patrolCalendar', patrolData);

  const existing = DB.get('patrol');
  const filtered = existing.filter(r=>r.date!==key);
  filtered.unshift({
    id:Date.now(), date:key, inspector:dayData.inspector, type:'패트롤 점검',
    weather:dayData.weather, siteFilter:patrolSiteFilter,
    totalChecked, totalItems, badCount:totalItems-totalChecked,
    issues:dayData.issues, createdAt:new Date().toISOString()
  });
  await DB.set('patrol', filtered);

  alert(`✅ ${key} 패트롤 저장! (${totalChecked}/${totalItems} 점검)\n\n메인 대시보드에도 실시간 반영됩니다.`);
  renderPatrolCalendar();
  renderHistories();
}

// 사진 (Supabase Storage)

async function addPatrolPhotos(input){
  if(!supaClient){ alert('Supabase 미연결 상태입니다. 대시보드 설정에서 먼저 연결해주세요.'); input.value=''; return; }
  const form = document.getElementById('patrol-checklist-form');
  const key = form?.dataset.key;
  if(!key){ alert('먼저 달력에서 날짜를 선택하세요.'); input.value=''; return; }
  const patrolData = DB.getObj('patrolCalendar');
  if(!patrolData[key]) patrolData[key] = {};
  if(!Array.isArray(patrolData[key].photos)) patrolData[key].photos = [];
  const previewEl = document.getElementById('p-photos-preview');
  const files = Array.from(input.files);

  for(let i = 0; i < files.length; i++){
    const file = files[i];
    const placeholder = document.createElement('div');
    placeholder.style.cssText = 'width:100px;height:100px;border:2px dashed #d1d5db;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:10px;color:#1e5096;text-align:center;padding:4px;';
    placeholder.textContent = `업로드 중... ${i+1}/${files.length}`;
    previewEl.appendChild(placeholder);

    try{
      const meta = await uploadToStorage(file, `patrol/${key}`);
      patrolData[key].photos.push(meta);
      await DB.set('patrolCalendar', patrolData);
      placeholder.remove();
      renderPatrolPhotosPreview(key);
    }catch(err){
      placeholder.style.border = '2px solid #dc2626';
      placeholder.style.color = '#dc2626';
      placeholder.textContent = '실패: ' + (err.message||'').slice(0,30);
      console.error('패트롤 사진 업로드 오류:', err);
    }
  }
  input.value = '';
}

function renderPatrolPhotosPreview(key){
  const previewEl = document.getElementById('p-photos-preview');
  if(!previewEl) return;
  const patrolData = DB.getObj('patrolCalendar');
  const photos = (patrolData[key] && Array.isArray(patrolData[key].photos)) ? patrolData[key].photos : [];
  if(photos.length === 0){ previewEl.innerHTML = ''; return; }
  previewEl.innerHTML = photos.map((p, i)=>{
    // url이 있으면 Supabase Storage, 없으면 레거시(base64 data)
    const src = p.url || p.data || '';
    const name = (p.name || '사진').replace(/'/g,'&apos;');
    return `<div style="position:relative;">
      <img src="${src}" style="width:100px;height:100px;object-fit:cover;border-radius:8px;border:2px solid #16a34a;cursor:pointer;" onclick="openPhotoLightbox('${src}','${name}')" title="클릭 = 크게 보기">
      <button onclick="removePatrolPhoto('${key}',${i})" style="position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:#dc2626;color:#fff;border:none;cursor:pointer;font-size:11px;line-height:1;">✕</button>
    </div>`;
  }).join('');
}

async function removePatrolPhoto(key, idx){
  if(!confirm('이 사진을 삭제하시겠습니까?')) return;
  const patrolData = DB.getObj('patrolCalendar');
  if(!patrolData[key] || !Array.isArray(patrolData[key].photos)) return;
  const photo = patrolData[key].photos[idx];
  if(photo && photo.path) await deleteFromStorage(photo.path);
  patrolData[key].photos.splice(idx, 1);
  await DB.set('patrolCalendar', patrolData);
  renderPatrolPhotosPreview(key);
}

function renderHistories(){
  const tbody = document.getElementById('patrol-history-body');
  if(!tbody) return;
  const data = DB.get('patrol');
  tbody.innerHTML = data.length===0
    ? '<tr><td colspan="6" style="text-align:center;color:#9ca3af;padding:20px;">기록 없음</td></tr>'
    : data.map(r=>{
        const siteLabel = r.siteFilter==='suwon'?'수원':r.siteFilter==='hwaseong'?'화성':'전체';
        return `<tr>
          <td>${r.date}</td>
          <td><span class="badge ${r.siteFilter==='suwon'?'blue':r.siteFilter==='hwaseong'?'yellow':'gray'}">${siteLabel}</span></td>
          <td>${r.inspector||'-'}</td>
          <td>${r.totalChecked||0}/${r.totalItems||0}</td>
          <td><span class="badge ${r.badCount===0?'green':r.badCount<=3?'yellow':'red'}">${r.badCount||0}건</span></td>
          <td class="no-print"><button class="btn btn-outline btn-sm" onclick="deletePatrolRecord(${r.id})">삭제</button></td>
        </tr>`;
      }).join('');
}

async function deletePatrolRecord(id){
  if(!confirm('이 이력을 삭제하시겠습니까?')) return;
  const arr = DB.get('patrol').filter(r=>r.id!==id);
  await DB.set('patrol', arr);
  renderHistories();
}

function openPhotoLightbox(src, caption){
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox-caption').textContent = caption || '';
  document.getElementById('photo-lightbox').classList.add('show');
  document.body.style.overflow = 'hidden';
}
function closePhotoLightbox(){
  document.getElementById('photo-lightbox').classList.remove('show');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', (e) => { if(e.key === 'Escape') closePhotoLightbox(); });

// INIT
// ============================================================
window.addEventListener('DOMContentLoaded', async () => {
  const sup = DB.getObj('supabase');
  const supaUrl = sup.url || DEFAULT_SUPABASE_URL;
  const supaKey = sup.key || DEFAULT_SUPABASE_KEY;
  if(supaUrl && supaKey){
    initSupabase(supaUrl, supaKey);
    await loadFromSupabase();
  } else {
    document.getElementById('conn-dot').className = 'conn-dot error';
    document.getElementById('conn-text').textContent = 'Supabase 미연결';
    document.getElementById('warn-no-supa').classList.add('show');
  }
  renderPatrolCalendar();
  renderHistories();

  window.addEventListener('storage', (e) => {
    if(e.key === 'safety_patrol' || e.key === 'safety_patrolCalendar'){
      renderPatrolCalendar(); renderHistories();
    }
  });
});
