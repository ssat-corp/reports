<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>신성오토텍(주) 내부 보고서</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Malgun Gothic', '맑은 고딕', Arial, sans-serif;
            background-color: #f0f2f5;
            color: #333;
            line-height: 1.7;
        }
        .container {
            max-width: 720px;
            margin: 40px auto;
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .header {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: #fff;
            padding: 35px 40px;
        }
        .header h1 { font-size: 22px; margin-bottom: 6px; }
        .header .sub { font-size: 13px; opacity: 0.7; }
        .content { padding: 30px 40px; }

        .card {
            display: block;
            text-decoration: none;
            color: #333;
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px 24px;
            margin: 12px 0;
            border-left: 5px solid #3498db;
            transition: all 0.2s ease;
        }
        .card:hover {
            background: #eaf2f8;
            transform: translateX(4px);
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        .card .title {
            font-size: 16px;
            font-weight: bold;
            color: #1a5276;
            margin-bottom: 4px;
        }
        .card .desc {
            font-size: 13px;
            color: #888;
        }
        .card .date {
            display: inline-block;
            background: #d4e6f1;
            color: #2471a3;
            font-size: 11px;
            padding: 2px 10px;
            border-radius: 10px;
            margin-top: 6px;
        }

        .card.warn { border-left-color: #e74c3c; }
        .card.warn .title { color: #c0392b; }
        .card.warn .date { background: #fde8e8; color: #c0392b; }

        .card.safety { border-left-color: #e67e22; }
        .card.safety .title { color: #d35400; }
        .card.safety .date { background: #fef3e2; color: #d35400; }

        .footer {
            padding: 18px 40px;
            font-size: 12px;
            color: #bbb;
            border-top: 1px solid #eee;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>신성오토텍(주) 내부 보고서</h1>
            <div class="sub">경영지원팀 | 보고서 모음</div>
        </div>
        <div class="content">

            <a class="card warn" href="ems-rereview.html">
                <div class="title">EMS 보급사업 재검토 보고서</div>
                <div class="desc">2026 산업계 에너지관리시스템 보급 지원사업 — 신청 보류 권고</div>
                <span class="date">2026.03.23</span>
            </a>

            <a class="card" href="ems-review.html">
                <div class="title">EMS 보급사업 검토 보고서</div>
                <div class="desc">2026 산업계 에너지관리시스템 보급 지원사업 — 초기 검토</div>
                <span class="date">2026.03.20</span>
            </a>

            <a class="card safety" href="fire-safety.html">
                <div class="title">긴급 공지사항 — 화재 안전</div>
                <div class="desc">전 사업장 화재 안전 긴급 공지</div>
                <span class="date">2026.03.20</span>
            </a>

        </div>
        <div class="footer">
            신성오토텍(주) 수원 본사 · 화성공장
        </div>
    </div>
</body>
</html>
