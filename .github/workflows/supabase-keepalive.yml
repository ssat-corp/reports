name: Supabase Keep-Alive

# 무료 플랜 자동 일시정지 방지 — 3일마다 간단한 SELECT 쿼리로 활동 기록
on:
  schedule:
    - cron: '0 3 */3 * *'  # 3일마다 새벽 3시 UTC (한국 정오)
  workflow_dispatch:  # 수동 실행도 가능

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          if [ -z "${{ secrets.SUPABASE_URL }}" ] || [ -z "${{ secrets.SUPABASE_ANON_KEY }}" ]; then
            echo "⚠️  Secrets not configured yet. Add SUPABASE_URL and SUPABASE_ANON_KEY in repo Settings → Secrets → Actions."
            exit 0
          fi
          echo "→ Pinging ${{ secrets.SUPABASE_URL }}/rest/v1/safety_store"
          response=$(curl -s -w "\n%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/safety_store?select=key&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | head -n-1)
          echo "HTTP: $http_code"
          echo "Body: $body"
          if [ "$http_code" -ge 400 ]; then
            echo "❌ Ping failed"
            exit 1
          fi
          echo "✅ Supabase alive (이 쿼리가 inactivity 타이머를 리셋합니다)"
