<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>현장 패트롤 점검표 (인쇄용)</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans KR','Malgun Gothic',sans-serif;background:#f0f4f9;color:#1a1a1a;font-size:13px;}

/* 화면용: 선택 UI */
.screen-only{padding:20px 24px;max-width:900px;margin:0 auto;}
.screen-only h1{font-size:20px;font-weight:900;color:#0d1f3c;margin-bottom:16px;}
.site-btns{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.site-btn{padding:10px 24px;border-radius:8px;font-size:14px;font-weight:700;border:2px solid #d1d5db;background:#fff;cursor:pointer;transition:all 0.2s;}
.site-btn:hover{border-color:#1e5096;background:#eef4ff;}
.site-btn.active{background:#1e5096;color:#fff;border-color:#1e5096;}
.print-btn{padding:12px 32px;border-radius:8px;font-size:15px;font-weight:700;border:none;background:#1e5096;color:#fff;cursor:pointer;margin-top:12px;}
.print-btn:hover{background:#163d7a;}
.preview-note{font-size:12px;color:#6b7280;margin-top:8px;}

/* 인쇄 영역 */
.print-area{display:none;}

/* 인쇄 스타일 */
@media print{
  body{background:#fff;font-size:11px;}
  .screen-only{display:none!important;}
  .print-area{display:block!important;}
  .page{
    width:210mm;min-height:295mm;max-height:297mm;
    padding:10mm 12mm 8mm;
    page-break-after:always;
    position:relative;
  }
  .page:last-child{page-break-after:auto;}

  @page{size:A4 portrait;margin:0;}
}

/* 미리보기용 (화면) */
.print-area.preview{display:block;max-width:210mm;margin:20px auto;border:1px solid #d1d5db;box-shadow:0 2px 8px rgba(0,0,0,0.1);}
.print-area.preview .page{padding:10mm 12mm 8mm;background:#fff;min-height:295mm;}

/* 점검표 공통 스타일 */
.header-bar{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:3px solid #0d1f3c;padding-bottom:8px;margin-bottom:6px;}
.header-bar h2{font-size:18px;font-weight:900;color:#0d1f3c;letter-spacing:-0.02em;}
.header-bar .sub{font-size:10px;color:#6b7280;margin-top:2px;}
.header-bar .logo-area{text-align:right;font-size:10px;color:#6b7280;font-weight:500;}

/* 상단 정보란 */
.info-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:0;border:1.5px solid #333;margin-bottom:8px;}
.info-cell{padding:5px 8px;border-right:1px solid #999;display:flex;align-items:center;gap:4px;font-size:11px;}
.info-cell:last-child{border-right:none;}
.info-cell .lbl{font-weight:700;color:#333;white-space:nowrap;min-width:36px;}
.info-cell .val{flex:1;border-bottom:1px dotted #999;min-height:16px;padding-left:4px;}

/* 체크리스트 테이블 */
.ck-table{width:100%;border-collapse:collapse;font-size:10.5px;line-height:1.35;}
.ck-table th{background:#0d1f3c;color:#fff;padding:4px 6px;font-weight:700;font-size:10px;
  -webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;color-adjust:exact!important;}
.ck-table td{padding:3.5px 6px;border:1px solid #ccc;vertical-align:middle;}
.ck-table .zone-header{background:#e8edf3;font-weight:800;font-size:10.5px;color:#0d1f3c;
  -webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}
.ck-table .chk-col{width:28px;text-align:center;}
.ck-table .chk-box{width:14px;height:14px;border:1.5px solid #555;display:inline-block;border-radius:2px;vertical-align:middle;}
.ck-table .no-col{width:22px;text-align:center;font-weight:600;color:#6b7280;font-size:10px;}
.ck-table .note-col{width:22%;}
.ck-table tr:nth-child(even) td{background:#fafbfc;-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}

/* 하단: 조치사항 + 서명란 */
.bottom-section{margin-top:6px;}
.action-box{border:1.5px solid #333;padding:6px 8px;min-height:50px;margin-bottom:6px;}
.action-box .lbl{font-weight:700;font-size:10.5px;margin-bottom:4px;}
.action-box .lines{border-bottom:1px dotted #bbb;height:16px;}

.sign-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0;border:1.5px solid #333;font-size:10px;}
.sign-cell{padding:4px 8px;border-right:1px solid #999;text-align:center;}
.sign-cell:last-child{border-right:none;}
.sign-cell .s-lbl{font-weight:700;color:#333;margin-bottom:2px;}
.sign-cell .s-line{border-bottom:1px solid #999;height:24px;margin-top:4px;}

.footer-note{text-align:center;font-size:8.5px;color:#aaa;margin-top:6px;}

/* 날씨·특이사항 체크 */
.weather-checks{display:flex;gap:10px;align-items:center;font-size:10.5px;}
.weather-checks label{display:flex;align-items:center;gap:3px;cursor:default;}
.weather-checks .chk-box{width:12px;height:12px;}
</style>
</head>
<body>

<!-- 화면: 사업장 선택 UI -->
<div class="screen-only" id="selector">
  <h1>🖨️ 현장 패트롤 점검표 인쇄</h1>
  <p style="font-size:13px;color:#6b7280;margin-bottom:16px;">사업장을 선택하면 해당 체크리스트가 A4 1장에 맞게 생성됩니다.</p>

  <div style="font-size:13px;font-weight:700;margin-bottom:8px;">사업장 선택:</div>
  <div class="site-btns">
    <button class="site-btn active" onclick="selectSite('suwon',this)">📍 수원 (사출·조립)</button>
    <button class="site-btn" onclick="selectSite('hwaseong',this)">📍 화성 (도색·화학)</button>
  </div>

  <div style="display:flex;gap:8px;align-items:center;margin-top:16px;">
    <button class="print-btn" onclick="doPrint()">🖨️ 인쇄하기 (A4)</button>
    <button class="print-btn" style="background:#16a34a;" onclick="togglePreview()">👁️ 미리보기</button>
  </div>
  <div class="preview-note">* 인쇄 시 여백: 없음(최소), 배경 그래픽 출력 체크해주세요.</div>
</div>

<!-- 인쇄 영역 -->
<div class="print-area" id="print-area"></div>

<script>
let currentSite = 'suwon';
let previewMode = false;

const patrolZones = [
  // 공통
  {id:'pc1', site:'all', name:'현장관리 기본', icon:'🛡️', items:[
    'TBM 활동 실시 확인',
    '보호구(안전모·안전화·보안경) 착용 확인 및 미착용자 시정',
    '통로 확보 (60cm↑) 및 바닥 미끄럼 요인 없음',
    '안전표지·수칙 게시 상태 양호',
    '비상연락망·응급처치함 비치 확인',
    '작업 중 휴대폰 사용 금지 준수'
  ]},
  {id:'pc6', site:'all', name:'소방·비상', icon:'🧯', items:[
    '소화기 배치·압력(녹색)·안전핀·몸체 상태 양호',
    '소화전 표시등 점등 / 호스·노즐 결합 상태',
    '비상구 표시등 점등 / 장애물 없음 (항시 개방)',
    '대피로 확보 / 구급함 비치 확인',
    '비상 연락처 게시판 부착 상태'
  ]},
  {id:'pc5', site:'all', name:'전기·분전반', icon:'⚡', items:[
    '각 층 분전반 문 잠금 / 내부 이물질·피복 양호',
    '분전반 접지 상태 양호',
    '조명 손상·탈락 / 콘센트 파손 없음',
    '임시 연장선 방치 없음 / 가연성 물질 없음'
  ]},
  {id:'pc9', site:'all', name:'공용구역·외부', icon:'🏢', items:[
    '사무동 통로 정리정돈 / 대피 동선 장애물 없음',
    '비상구 표시 명확 / 출입구 물건 방치 없음',
    '외부 통로 바닥(균열·미끄럼) / 주차장 정리',
    '외부 조명·배수로 상태 양호'
  ]},
  {id:'pc10', site:'all', name:'3정5S 점검', icon:'✨', items:[
    '[정품] 지정 자재·부품만 있는가 (불필요 물품 제거)',
    '[정량] 적정 수량만 보관 (과다 적재 없음)',
    '[정위치] 자재·공구 지정 위치 보관',
    '[청소] 작업장·설비·바닥 청소 상태',
    '공구 사용 후 제자리 반납 / 퇴근 전 5분 정리'
  ]},
  {id:'pc8', site:'all', name:'환경·폐기물', icon:'🌊', items:[
    '환풍기 작동 / 작업장 환기 상태 양호',
    '폐기물 지정 장소 외 방치·넘침 없음',
    '분리수거 적정 / 유해 폐기물 별도 보관'
  ]},

  // 수원
  {id:'pc2s', site:'suwon', name:'사출·조립 설비', icon:'🏭', items:[
    '사출기 안전문 닫힘 / 비상정지 작동',
    '사출기 주변 오일·수지 누출 없음',
    '금형 체결 상태 (볼트 완료)',
    '컨베이어 안전덮개 정상 (목장갑 금지)',
    '래핑기 안전덮개·비상정지 정상',
    '건조기 온도·잠금 / 리프트 안전바·하중',
    '각 설비 비상정지·스위치 작동 확인',
    '방호장치·안전가드 설치 상태',
    '설비 정비 시 LOTO 실시 확인'
  ]},
  {id:'pc3s', site:'suwon', name:'크레인·금형', icon:'🏗️', items:[
    '체인·와이어 마모 없음 / 훅 해지장치 정상',
    '최대하중 표시 확인 (초과 없음)',
    '인양 중 하부 작업자 없음 / 키 이상 운반 금지',
    '금형 2인1조+신호수 / 안전모 착용',
    '금형 보관대 안전 고정 상태'
  ]},
  {id:'pc4s', site:'suwon', name:'지게차·운반', icon:'🚜', items:[
    '지게차 통로 구분 / 보행자 혼용 없음',
    '후방경보·제동 정상 / 면허 소지 확인',
    '포크 20~30cm 유지 / 키 분리보관',
    '중량물 2인↑ 운반 (25kg 이상)'
  ]},
  {id:'pcsw', site:'suwon', name:'수원 환경설비', icon:'🌊', items:[
    '쿨링타워 가동 상태 (동절기 확인)',
    '쿨링타워 누수 없음 / 냉각수 보충',
    '콤프레샤 작동 및 이상음 없음'
  ]},

  // 화성
  {id:'pc2h', site:'hwaseong', name:'도색·레이저 설비', icon:'🏭', items:[
    '도색 부스 환기·배기장치 정상 작동',
    '도색실 방폭 설비·접지 상태 양호',
    '레이저 장비 안전커버·인터록 정상',
    '레이저 보안경 착용 확인 (작업자 전원)',
    '각 설비 비상정지·스위치 작동 확인',
    '방호장치·안전가드 설치 상태',
    '설비 정비 시 LOTO 실시 확인'
  ]},
  {id:'pc7h', site:'hwaseong', name:'유해·화학물질', icon:'🧪', items:[
    '유해물질 지정 장소 보관 / 경고표지 부착',
    'MSDS 비치 및 작업자 숙지 확인',
    '취급 시 보호구(방독마스크·내화학장갑) 착용',
    '화학물질 보관소 소화기·환기 상태',
    '유해물질 취급자 교육 실시 확인',
    '유기용제 전용 용기 사용 / 밀폐 보관'
  ]},
  {id:'pc4h', site:'hwaseong', name:'지게차·운반', icon:'🚜', items:[
    '지게차 통로 구분 / 보행자 혼용 없음',
    '후방경보·제동 정상 / 면허 소지 확인',
    '포크 20~30cm 유지 / 키 분리보관',
    '중량물 2인↑ 운반 (25kg 이상)'
  ]},
  {id:'pchw', site:'hwaseong', name:'화성 환경설비', icon:'🌬️', items:[
    '도색실 배기·집진 장치 작동 확인',
    '유기용제 작업장 환기 상태 양호',
    '소음·분진 수준 이상 없음',
    '폐도료·폐용제 별도 수거 보관'
  ]}
];

const siteLabels = {suwon:'수원공장 (사출·조립)', hwaseong:'화성공장 (도색·화학)'};

function selectSite(site, btn){
  currentSite = site;
  document.querySelectorAll('.site-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(previewMode) renderPrint();
}

function togglePreview(){
  previewMode = !previewMode;
  const area = document.getElementById('print-area');
  if(previewMode){
    area.classList.add('preview');
    renderPrint();
  } else {
    area.classList.remove('preview');
    area.innerHTML = '';
  }
}

function doPrint(){
  const area = document.getElementById('print-area');
  area.classList.remove('preview');
  renderPrint();
  setTimeout(()=>window.print(), 300);
}

function getZones(site){
  return patrolZones.filter(z => z.site==='all' || z.site===site);
}

function renderPrint(){
  const zones = getZones(currentSite);
  const siteName = siteLabels[currentSite];
  const today = new Date();
  const dateStr = today.getFullYear()+'년 '+(today.getMonth()+1)+'월 '+today.getDate()+'일';
  const dayNames = ['일','월','화','수','목','금','토'];
  const dayStr = dayNames[today.getDay()]+'요일';

  // 전체 항목 수 계산
  let totalItems = 0;
  zones.forEach(z => totalItems += z.items.length);

  let num = 0;
  let tableRows = '';
  zones.forEach(zone => {
    tableRows += `<tr><td colspan="4" class="zone-header">${zone.icon} ${zone.name}</td></tr>`;
    zone.items.forEach(item => {
      num++;
      tableRows += `<tr>
        <td class="no-col">${num}</td>
        <td>${item}</td>
        <td class="chk-col"><span class="chk-box"></span></td>
        <td class="note-col"></td>
      </tr>`;
    });
  });

  const html = `
  <div class="page">
    <!-- 헤더 -->
    <div class="header-bar">
      <div>
        <h2>현장 패트롤 점검표</h2>
        <div class="sub">산업안전보건법 §15·§16 / ${siteName}</div>
      </div>
      <div class="logo-area">
        신성오토텍<br>${dateStr} (${dayStr})
      </div>
    </div>

    <!-- 상단 정보란 -->
    <div class="info-row">
      <div class="info-cell"><span class="lbl">사업장</span><span class="val">${siteName}</span></div>
      <div class="info-cell"><span class="lbl">점검자</span><span class="val"></span></div>
      <div class="info-cell"><span class="lbl">점검일</span><span class="val">${dateStr}</span></div>
      <div class="info-cell">
        <span class="lbl">날씨</span>
        <div class="weather-checks">
          <label><span class="chk-box"></span> 맑음</label>
          <label><span class="chk-box"></span> 흐림</label>
          <label><span class="chk-box"></span> 비</label>
          <label><span class="chk-box"></span> 눈</label>
        </div>
      </div>
    </div>

    <!-- 특이사항 체크 -->
    <div style="display:flex;gap:16px;margin-bottom:6px;font-size:10.5px;padding:3px 0;">
      <span style="font-weight:700;">금일 특이사항:</span>
      <label><span class="chk-box" style="width:12px;height:12px;display:inline-block;border:1.5px solid #555;border-radius:2px;vertical-align:middle;margin-right:2px;"></span> 신규 작업자 있음</label>
      <label><span class="chk-box" style="width:12px;height:12px;display:inline-block;border:1.5px solid #555;border-radius:2px;vertical-align:middle;margin-right:2px;"></span> 특별 작업 (용접/밀폐 등)</label>
      <label><span class="chk-box" style="width:12px;height:12px;display:inline-block;border:1.5px solid #555;border-radius:2px;vertical-align:middle;margin-right:2px;"></span> 외부 업체 작업</label>
      <label><span class="chk-box" style="width:12px;height:12px;display:inline-block;border:1.5px solid #555;border-radius:2px;vertical-align:middle;margin-right:2px;"></span> 해당 없음</label>
    </div>

    <!-- 체크리스트 테이블 -->
    <table class="ck-table">
      <thead>
        <tr>
          <th class="no-col">No</th>
          <th>점검내용</th>
          <th class="chk-col">적합</th>
          <th class="note-col">비고 (부적합 시 내용 기재)</th>
        </tr>
      </thead>
      <tbody>
        ${tableRows}
      </tbody>
    </table>

    <!-- 하단 -->
    <div class="bottom-section">
      <div class="action-box">
        <div class="lbl">조치사항 / 개선 필요사항</div>
        <div class="lines"></div>
        <div class="lines"></div>
      </div>

      <div class="sign-row">
        <div class="sign-cell"><div class="s-lbl">점검자</div><div class="s-line"></div></div>
        <div class="sign-cell"><div class="s-lbl">관리감독자</div><div class="s-line"></div></div>
        <div class="sign-cell"><div class="s-lbl">안전보건관리담당</div><div class="s-line"></div></div>
      </div>
    </div>

    <div class="footer-note">점검 완료 후 안전보건관리 담당에게 제출 | 총 ${totalItems}개 항목 | 신성오토텍 안전보건관리</div>
  </div>`;

  document.getElementById('print-area').innerHTML = html;
}
</script>
</body>
</html>
